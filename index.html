<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════ */
:root {
    --bg-dark: #0a0e27;
    --bg-body: #1a1635;
    --accent: #7a6fbf;
    --accent-bright: #9a8fdf;
    --text-primary: #e5e5f0;
    --text-secondary: #9a9fb5;
    --text-tertiary: #6a7080;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    --transition-fast: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    --glass-bg: rgba(18, 22, 48, 0.35);
    --glass-bg-hover: rgba(22, 28, 58, 0.45);
    --glass-border: rgba(100, 115, 155, 0.2);
    --glass-border-hover: var(--accent-40);
    --card-bg: rgba(20, 25, 45, 0.25);
    --card-border: rgba(70, 80, 110, 0.15);
    --card-border-hover: var(--accent-35);
    --card-shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.25);
    --accent-glow: var(--accent-12);
    --accent-border: var(--accent-20);
    --danger: #ff6b6b;
    --warning: #ffa502;
    /* Opacity variants for accent color */
    --accent-05: rgba(122, 111, 191, 0.05);
    --accent-06: rgba(122, 111, 191, 0.06);
    --accent-07: rgba(122, 111, 191, 0.07);
    --accent-08: rgba(122, 111, 191, 0.08);
    --accent-10: rgba(122, 111, 191, 0.10);
    --accent-12: rgba(122, 111, 191, 0.12);
    --accent-14: rgba(122, 111, 191, 0.14);
    --accent-15: rgba(122, 111, 191, 0.15);
    --accent-18: rgba(122, 111, 191, 0.18);
    --accent-20: rgba(122, 111, 191, 0.20);
    --accent-22: rgba(122, 111, 191, 0.22);
    --accent-25: rgba(122, 111, 191, 0.25);
    --accent-30: rgba(122, 111, 191, 0.30);
    --accent-35: rgba(122, 111, 191, 0.35);
    --accent-40: rgba(122, 111, 191, 0.40);
    --accent-45: rgba(122, 111, 191, 0.45);
    --accent-50: rgba(122, 111, 191, 0.50);
    --accent-55: rgba(122, 111, 191, 0.55);
    --accent-60: rgba(122, 111, 191, 0.60);
    --accent-70: rgba(122, 111, 191, 0.70);
    --accent-80: rgba(122, 111, 191, 0.80);
    /* Semantic color tokens */
    --danger-bg: rgba(255, 80, 80, 0.07);
    --danger-border: rgba(255, 80, 80, 0.18);
    --warning-border: rgba(255, 165, 2, 0.5);
    --card-bg-dark: rgba(10, 14, 39, 0.75);
    --overlay-bg: rgba(0, 0, 0, 0.6);
    --modal-bg: rgba(14, 18, 38, 0.97);
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
    font-family: var(--font-body);
    background: var(--bg-body);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
}

/* ═══════════════════════════════════════
   3D SPACE BACKGROUND
═══════════════════════════════════════ */
#space-bg {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse at 50% 50%, var(--bg-body) 0%, #0a0a1a 50%, #000 100%);
    overflow: hidden;
}
#space-bg::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, var(--accent-15) 0%, transparent 60%);
    filter: blur(60px);
    animation: pulseGlow 8s ease-in-out infinite;
}
@keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
}
@keyframes accentPulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
}
@keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
.space-orb {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%,
        var(--accent-60) 0%,
        rgba(154, 143, 223, 0.4) 30%,
        rgba(76, 66, 141, 0.25) 50%,
        rgba(30, 25, 65, 0.1) 70%,
        transparent 100%);
    filter: blur(50px);
    animation: orbFloat 20s ease-in-out infinite;
    box-shadow: 0 0 100px var(--accent-30), inset 0 0 60px rgba(154, 143, 223, 0.2);
    will-change: transform;
    contain: layout;
}
.space-orb-1 { width: 600px; height: 600px; top: -200px; left: -200px; animation-duration: 25s; }
.space-orb-2 { width: 500px; height: 500px; top: 50%; right: -150px; animation-delay: -8s; animation-duration: 30s; }
.space-orb-3 { width: 450px; height: 450px; bottom: -100px; left: 30%; animation-delay: -15s; animation-duration: 28s; }
.space-orb-4 { width: 350px; height: 350px; top: 30%; left: 40%; animation-delay: -5s; animation-duration: 35s; }

@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    25% { transform: translate(50px, -80px) rotate(90deg) scale(1.1); }
    50% { transform: translate(-30px, 60px) rotate(180deg) scale(0.95); }
    75% { transform: translate(80px, 40px) rotate(270deg) scale(1.05); }
}
.space-stars {
    position: absolute; inset: 0;
    background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(2px 2px at 60% 70%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 50% 20%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(1px 1px at 80% 10%, rgba(255, 255, 255, 0.15), transparent),
        radial-gradient(2px 2px at 90% 60%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 33% 50%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(2px 2px at 15% 80%, rgba(255, 255, 255, 0.2), transparent);
    background-size: 200% 200%;
    animation: starsTwinkle 8s ease-in-out infinite;
    opacity: 0.5;
}
@keyframes starsTwinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.02); }
}

/* Reduce animation load for users who prefer reduced motion or low-end devices */
@media (prefers-reduced-motion: reduce) {
    .space-orb, .space-stars, #space-bg::before { animation: none !important; }
    .support-icon { animation: none !important; }
}
/* Hide extra orbs on small/low-end screens to save GPU */
@media (max-width: 400px) {
    .space-orb-3, .space-orb-4 { display: none; }
}
/* FIX v3 #22: Hide orb-3 on medium screens too */
@media (max-width: 600px) {
    .space-orb-3 { display: none; }
}
/* Optimize backdrop-filter for mobile devices to save GPU */
@media (max-width: 480px) {
    .glass, .subscription-card, .ref-link, .promo-section,
    .support-card, .faq, .stat-card, .topup-method,
    .header, .bottom-nav, .modal-content, .modal-overlay,
    .toast, .connect-help-card, .tariff-card {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }
}

/* ═══════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════ */
#app { position: fixed; inset: 0; display: flex; flex-direction: column; }
.ui-layer {
    display: flex; flex-direction: column;
    height: 100%; width: 100%;
    padding-left: max(12px, var(--safe-left));
    padding-right: max(12px, var(--safe-right));
    overflow: hidden;
}

/* ═══════════════════════════════════════
   ENTRANCE ANIMATIONS
   Amplitude: 15px, Duration: 0.6s ease-out
═══════════════════════════════════════ */
@keyframes nvxFadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes nvxSlideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes nvxSlideUp   { from { opacity: 0; transform: translateY(15px); }  to { opacity: 1; transform: translateY(0); } }
@keyframes nvxSlideLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

/* Base animation classes — start invisible */
.anim-title, .anim-left, .anim-up, .anim-down, .anim-fade { opacity: 0; }

/* Animation types */
.anim-title { animation: nvxSlideDown 0.6s ease-out both; }
.anim-left  { animation: nvxSlideLeft 0.6s ease-out both; }
.anim-up    { animation: nvxSlideUp 0.6s ease-out both; }
.anim-down  { animation: nvxSlideDown 0.6s ease-out both; }
.anim-fade  { animation: nvxFadeIn 0.6s ease-out both; }

/* Stagger delays — generated for each animation type */
.anim-d0 { animation-delay: 0s; }     .anim-d1 { animation-delay: 0.05s; }
.anim-d2 { animation-delay: 0.1s; }   .anim-d3 { animation-delay: 0.15s; }
.anim-d4 { animation-delay: 0.2s; }   .anim-d5 { animation-delay: 0.25s; }
.anim-d6 { animation-delay: 0.3s; }

.anim-left-d1 { animation-delay: 0.05s; } .anim-left-d2 { animation-delay: 0.1s; }
.anim-left-d3 { animation-delay: 0.15s; }
.anim-up-d1 { animation-delay: 0.05s; }   .anim-up-d2 { animation-delay: 0.1s; }
.anim-up-d3 { animation-delay: 0.15s; }   .anim-up-d4 { animation-delay: 0.2s; }
.anim-up-d5 { animation-delay: 0.25s; }   .anim-up-d6 { animation-delay: 0.3s; }
.anim-down-d1 { animation-delay: 0.05s; } .anim-down-d2 { animation-delay: 0.1s; }
.anim-down-d3 { animation-delay: 0.15s; }
.anim-fade-d1 { animation-delay: 0.05s; } .anim-fade-d2 { animation-delay: 0.1s; }
.anim-fade-d3 { animation-delay: 0.15s; } .anim-fade-d4 { animation-delay: 0.2s; }
.anim-fade-d5 { animation-delay: 0.25s; } .anim-fade-d6 { animation-delay: 0.3s; }

/* After animation completes — clean state for hover */
/* FIX: Do NOT set transform:none — it breaks CSS hover transitions */
.anim-done {
    animation: none;
    opacity: 1;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    margin-top: max(10px, var(--safe-top));
    margin-bottom: 8px;
    flex-shrink: 0;
    background: rgba(20, 25, 45, 0.25);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: var(--transition);
    cursor: default;
}
.header:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: rgba(25, 32, 58, 0.35);
    box-shadow: var(--card-shadow-hover);
}
.user-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
.avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-60), rgba(154, 143, 223, 0.4));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: white; font-weight: 700;
    flex-shrink: 0; border: 1px solid var(--accent-30); overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
}
.header:hover .avatar {
    transform: scale(1.1);
    box-shadow: 0 4px 14px var(--accent-30);
}
.avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }
.user-details { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.user-name { font-weight: 700; font-size: 14px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-id { font-size: 11px; color: var(--text-secondary); }
.balance {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; background: rgba(30, 35, 55, 0.3);
    border-radius: 28px; font-weight: 600; font-size: 13px;
    border: 1px solid rgba(70, 80, 110, 0.2);
    color: var(--text-primary); flex-shrink: 0; cursor: pointer;
    transition: var(--transition);
}
.balance:hover { background: rgba(40, 50, 75, 0.4); }
.balance i { font-size: 14px; color: var(--accent-bright); }

/* ═══════════════════════════════════════
   CONTENT AREA
═══════════════════════════════════════ */
.content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 2px 0 8px;
    scrollbar-width: none; -ms-overflow-style: none;
    -webkit-overflow-scrolling: touch;
}
.content::-webkit-scrollbar { display: none; }

.section-title {
    font-family: var(--font-display);
    font-size: 21px; font-weight: 700;
    margin: 6px 0 12px; padding-bottom: 6px;
    color: var(--text-primary); letter-spacing: -0.5px;
    position: relative; display: block;
}
.section-title::after {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 40px; height: 2px;
    background: linear-gradient(90deg, var(--accent-bright), rgba(154, 143, 223, 0.3), var(--accent-bright));
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
    border-radius: 2px;
}
.section-subtitle {
    font-size: 12px; font-weight: 600;
    margin: 14px 0 10px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.8px;
    display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════
   GLASS EFFECT
═══════════════════════════════════════ */
.glass {
    background: rgba(12, 15, 35, 0.55);
    backdrop-filter: blur(20px) saturate(200%);
    -webkit-backdrop-filter: blur(20px) saturate(200%);
    border: 1px solid rgba(90, 105, 150, 0.4);
    border-radius: 20px;
    transition: var(--transition);
    box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.35),
        0 1px 0 rgba(255, 255, 255, 0.05) inset;
}
.glass:hover {
    border-color: var(--accent-55);
    background: rgba(16, 20, 48, 0.65);
    box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.45),
        0 0 0 1px var(--accent-12),
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
    transform: translateY(-1px);
}

/* ═══════════════════════════════════════
   HOVERABLE CARD — unified hover behavior
═══════════════════════════════════════ */
.hoverable {
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-color 0.28s ease,
                box-shadow 0.28s ease,
                background 0.28s ease;
    cursor: default;
    /* FIX: Force GPU compositing layer — Chromium drops hover on backdrop-filter elements */
    transform: translateZ(0);
}
.hoverable:hover {
    transform: translateY(-2px) translateZ(0);
    border-color: var(--card-border-hover);
    box-shadow: var(--card-shadow-hover);
}

/* FIX: Force GPU layers on all backdrop-filter elements that need hover */
.tariff-card, .topup-method, .stat-card, .ref-link,
.promo-section, .connect-help-card, .header, .faq,
.support-card, .subscription-card {
    transform: translateZ(0);
}
.tariff-card:hover { transform: translateY(-2px) translateZ(0); }
.topup-method:hover { transform: translateX(3px) translateZ(0); }
.stat-card:hover { transform: translateY(-2px) translateZ(0); }
.ref-link:hover { transform: translateY(-2px) translateZ(0); }
.promo-section:hover { transform: translateY(-2px) translateZ(0); }
.connect-help-card:hover { transform: translateY(-1px) translateZ(0); }
.header:hover { transform: translateY(-2px) translateZ(0); }
.faq:hover { transform: translateZ(0); }
.support-card:hover { transform: translateY(-2px) translateZ(0); }
.subscription-card:hover { transform: translateZ(0); }

/* ═══════════════════════════════════════
   SUBSCRIPTION CARD
═══════════════════════════════════════ */
.subscription-card {
    padding: 16px; margin-bottom: 12px;
    position: relative; overflow: hidden;
    background: rgba(15, 18, 40, 0.55);
    border: 1px solid rgba(80, 90, 130, 0.25);
    border-radius: 20px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
}
.subscription-card::before {
    content: ''; position: absolute;
    top: -20%; right: -20%;
    width: 120px; height: 120px;
    background: radial-gradient(circle, var(--accent-10) 0%, transparent 70%);
    border-radius: 50%; filter: blur(30px);
    pointer-events: none; opacity: 0.6;
}
.subscription-card:hover {
    background: rgba(20, 25, 50, 0.65);
}
.subscription-card .title {
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    margin-bottom: 12px; color: var(--accent-bright);
    display: flex; align-items: center; gap: 8px;
}
.subscription-card .title i { font-size: 18px; }
.subscription-card .detail {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; margin-bottom: 6px;
    color: var(--text-secondary);
    padding: 4px 0 4px 0; border-bottom: 1px solid rgba(70, 80, 110, 0.1);
    transition: padding-left 0.22s ease, color 0.22s ease;
    cursor: default;
}
.subscription-card .detail:last-of-type { border-bottom: none; }
.subscription-card .detail:hover {
    padding-left: 5px;
    color: var(--accent-bright);
}
.subscription-card .detail i { width: 16px; color: var(--accent-bright); font-size: 12px; flex-shrink: 0; }
.subscription-card .detail .value { color: var(--text-primary); font-weight: 600; margin-left: auto; }

/* ═══════════════════════════════════════
   CONNECT HELP CARD
═══════════════════════════════════════ */
.connect-help-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: rgba(20, 25, 45, 0.3);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    cursor: pointer;
    transition: var(--transition);
}
.connect-help-card:hover {
    border-color: var(--accent-30);
    transform: translateY(-1px);
    background: rgba(25, 32, 58, 0.4);
}
.connect-help-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent-glow);
    border: 1px solid var(--accent-15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.connect-help-icon i { font-size: 15px; color: var(--accent-bright); }
.connect-help-text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.connect-help-text .label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.connect-help-text .desc  { font-size: 11px; color: var(--text-tertiary); }

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
    border: none; border-radius: 18px; padding: 10px 18px;
    font-weight: 600; font-size: 13px;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: var(--transition);
    font-family: var(--font-body); white-space: nowrap;
    min-height: 44px; -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn.primary {
    background: linear-gradient(135deg, var(--accent-70), rgba(154, 143, 223, 0.5));
    color: white; border: 1px solid var(--accent-30);
    backdrop-filter: blur(8px); box-shadow: 0 4px 12px var(--accent-15);
}
.btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px var(--accent-20); }
.btn.secondary {
    background: rgba(30, 35, 55, 0.3); border: 1px solid rgba(70, 80, 110, 0.2);
    color: var(--text-secondary); backdrop-filter: blur(8px);
}
.btn.secondary:hover { background: rgba(40, 50, 75, 0.4); color: var(--accent-bright); }
.btn.full-width { width: 100%; }
.btn.rounded { border-radius: 26px; }

/* FIX v3 #23: focus-visible styles for keyboard navigation */
.btn:focus-visible, .nav-item:focus-visible, .topup-method:focus-visible,
.copy-btn:focus-visible, .promo-btn:focus-visible, .modal-close:focus-visible,
.modal-btn:focus-visible, .modal-btn-primary:focus-visible,
.faq-row:focus-visible, .connect-help-card:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: 2px;
}

.progress-bar { height: 4px; background: rgba(70, 80, 110, 0.15); border-radius: 2px; margin: 8px 0 6px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-60), rgba(154, 143, 223, 0.4)); border-radius: 2px; transition: width 0.4s ease; }

/* ═══════════════════════════════════════
   ACTION ROW BUTTONS
═══════════════════════════════════════ */
.action-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.btn.action-row {
    display: flex; flex-direction: row; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 16px; text-align: left;
    justify-content: flex-start; width: 100%;
    background: var(--card-bg);
    border: 1px solid rgba(70, 80, 110, 0.2);
    box-shadow: none; color: var(--text-primary);
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
               border-color 0.28s ease,
               background 0.28s ease;
}
.btn.action-row:hover {
    background: var(--accent-glow);
    border-color: var(--accent-25);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.action-icon-wrap {
    width: 42px; height: 42px; border-radius: 12px;
    background: rgba(70, 80, 110, 0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; color: var(--accent-bright);
    transition: var(--transition);
}
.btn.action-row:hover .action-icon-wrap { background: var(--accent-15); transform: scale(1.08); }
.action-text-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.action-label { font-weight: 700; font-size: 14px; color: var(--text-primary); }
.action-desc { font-size: 11px; color: rgba(255, 255, 255, 0.5); }
.action-arrow { font-size: 11px; color: rgba(255, 255, 255, 0.35); flex-shrink: 0; }

/* ═══════════════════════════════════════
   NO SUBSCRIPTION STATE
═══════════════════════════════════════ */
.no-sub-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--accent-glow);
    border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
}
.no-sub-icon i { font-size: 24px; color: var(--accent-bright); }
.no-sub-text { color: var(--text-secondary); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }

/* ═══════════════════════════════════════
   TARIFF CARDS
═══════════════════════════════════════ */
.tariffs-list { display: flex; flex-direction: column; gap: 10px; }
.tariff-card {
    padding: 13px 14px; cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
               border-color 0.28s ease,
               box-shadow 0.28s ease,
               background 0.28s ease;
    position: relative; overflow: hidden;
    background: var(--card-bg);
    border: 1px solid rgba(70, 80, 110, 0.18);
    border-radius: 18px; backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex; flex-direction: column; gap: 9px;
}
.tariff-card:hover {
    background: rgba(30, 40, 65, 0.35);
    border-color: var(--card-border-hover);
    transform: translateY(-2px);
    box-shadow: var(--card-shadow-hover);
}
.tariff-card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.tariff-card-days { display: flex; align-items: baseline; gap: 4px; }
.tariff-days-num { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1; }
.tariff-days-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.tariff-card-price {
    display: flex; align-items: baseline; gap: 2px;
    background: var(--accent-glow); border: 1px solid var(--accent-border);
    border-radius: 10px; padding: 4px 12px; flex-shrink: 0;
}
.tariff-price-num { font-family: var(--font-display); font-size: 17px; font-weight: 800; color: var(--accent-bright); line-height: 1; }
.tariff-price-cur { font-size: 12px; color: var(--accent); font-weight: 600; }
.tariff-card-features { display: flex; gap: 6px; flex-wrap: wrap; }
.tariff-feature {
    display: flex; align-items: center; gap: 4px; font-size: 11px;
    color: var(--text-secondary); background: rgba(30, 35, 55, 0.4);
    border: 1px solid var(--card-border); border-radius: 7px; padding: 3px 8px; font-weight: 500;
}
.tariff-feature i { color: var(--accent-bright); font-size: 10px; width: 12px; text-align: center; }
.tariff-locations { border-top: 1px solid rgba(70, 80, 110, 0.12); padding-top: 8px; display: flex; flex-direction: column; gap: 5px; }
.tariff-locations-label {
    font-size: 10px; color: var(--text-tertiary); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    display: flex; align-items: center; gap: 5px;
}
.tariff-locations-label i { color: var(--accent); font-size: 10px; }
.tariff-countries { display: flex; flex-wrap: wrap; gap: 5px; }
.country-flag {
    font-size: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(30, 35, 55, 0.4);
    border: 1px solid var(--card-border);
    transition: all 0.22s;
    cursor: default; line-height: 1;
}
.country-flag:hover { background: var(--accent-15); border-color: var(--accent-30); transform: scale(1.12); }
.tariff-locations-note {
    font-size: 10px; color: var(--accent-bright);
    background: var(--accent-08); border: 1px solid var(--accent-15);
    border-radius: 7px; padding: 4px 8px;
    display: flex; align-items: center; gap: 5px; font-weight: 500;
}
.tariff-card-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px;
    background: linear-gradient(135deg, var(--accent-50), rgba(154, 143, 223, 0.3));
    border: 1px solid var(--accent-30); border-radius: 11px;
    font-size: 13px; font-weight: 700; color: white; transition: all 0.2s;
    cursor: pointer; border: none; font-family: var(--font-body);
}
.tariff-card:hover .tariff-card-btn {
    background: linear-gradient(135deg, var(--accent-70), rgba(154, 143, 223, 0.5));
}

/* ═══════════════════════════════════════
   STATS GRID (Referral)
═══════════════════════════════════════ */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-card {
    padding: 12px 8px; text-align: center; border-radius: 16px;
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: default;
}
.stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: rgba(25, 32, 58, 0.35);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.stat-icon { font-size: 20px; color: var(--accent-bright); }
.stat-label { font-size: 9px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-value { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--accent-bright); }

/* REF LINK */
.ref-link {
    padding: 14px; margin-bottom: 14px;
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    border-radius: 18px; backdrop-filter: blur(8px);
    cursor: default;
}
.ref-link:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.ref-link p { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 600; }
.ref-link-input {
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(70, 80, 110, 0.15);
    border-radius: 12px; padding: 10px 14px;
    color: var(--text-primary); font-size: 11px;
}
.copy-btn {
    width: 44px; height: 44px; border-radius: 28px;
    background: var(--accent-50); border: 1px solid var(--accent-30);
    color: white; font-size: 14px; cursor: pointer; transition: var(--transition);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.copy-btn:hover { transform: scale(1.05); background: var(--accent-60); }

/* INFO HINT BLOCK (reusable) */
.info-hint {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 14px;
    background: var(--accent-06);
    border: 1px solid var(--accent-12);
    border-radius: 14px; margin-bottom: 14px;
}
.info-hint i { color: var(--accent-bright); font-size: 13px; margin-top: 1px; flex-shrink: 0; }
.info-hint span { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.info-hint.info-lg span { font-size: 12px; }

/* ═══════════════════════════════════════
   TOPUP METHODS
═══════════════════════════════════════ */
.topup-method {
    padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    border-radius: 16px; background: rgba(20, 25, 45, 0.2);
    border: 1px solid var(--card-border);
    transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer; position: relative; overflow: hidden;
    backdrop-filter: blur(8px); min-height: 48px; margin-bottom: 8px;
}
.topup-method::after {
    content: ''; position: absolute; left: 0; top: 0;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, var(--accent-70), transparent);
    transform: scaleY(0); transform-origin: top;
    transition: transform 0.3s ease-out;
}
.topup-method:hover {
    border-color: var(--accent-30);
    background: rgba(30, 40, 60, 0.35);
    transform: translateX(3px);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.topup-method:hover::after { transform: scaleY(1); }
.topup-method:active { transform: scale(0.97); }
.topup-method i:first-child { font-size: 20px; color: var(--accent-bright); width: 24px; flex-shrink: 0; }
.topup-method-text { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.topup-method-name { font-weight: 700; color: var(--text-primary); font-size: 14px; }
.topup-method-desc { font-size: 11px; color: var(--text-secondary); font-weight: 400; line-height: 1.4; }
.topup-method-arrow { font-size: 12px; color: var(--text-tertiary); flex-shrink: 0; }
.topup-method .topup-method-name { font-weight: 700; font-size: 14px; color: var(--text-primary); }
.topup-method .topup-method-desc { font-size: 11px; font-weight: 400; color: var(--text-secondary); }

/* ═══════════════════════════════════════
   REFERRAL HERO CARD
═══════════════════════════════════════ */

/* PROMO */
.promo-section {
    background: var(--accent-08); border: 1px solid var(--accent-18);
    border-radius: 18px; padding: 14px; margin-bottom: 14px;
    transition: var(--transition-fast);
    cursor: default;
}
.promo-section:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: var(--accent-glow);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.promo-section p { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 600; }
.promo-section p i { color: var(--accent-bright); }
.promo-row { display: flex; gap: 8px; }
.promo-input {
    flex: 1; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(70, 80, 110, 0.2);
    border-radius: 12px; padding: 11px 14px; color: var(--text-primary);
    font-size: 13px; outline: none; font-family: var(--font-body); transition: border-color 0.2s;
}
.promo-input::placeholder { color: var(--text-tertiary); }
.promo-input:focus { border-color: var(--glass-border-hover); }
.promo-btn {
    padding: 11px 16px;
    background: linear-gradient(135deg, var(--accent-70), rgba(154, 143, 223, 0.5));
    border: none; border-radius: 12px; color: white; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; font-family: var(--font-body); transition: var(--transition);
}
.promo-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-20); }
.promo-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ═══════════════════════════════════════
   SUPPORT
═══════════════════════════════════════ */
.support-card {
    padding: 20px 16px; text-align: center; margin-bottom: 16px;
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    border-radius: 18px; backdrop-filter: blur(8px);
    cursor: default;
}
.support-card:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: rgba(25, 32, 58, 0.3);
    box-shadow: var(--card-shadow-hover);
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}
.support-icon {
    font-size: 40px; color: var(--accent-bright); margin-bottom: 10px; display: block;
    animation: float 2.8s ease-in-out infinite;
}
.support-card p { color: var(--text-secondary); margin-bottom: 12px; font-size: 13px; }

/* FAQ */
.faq {
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    border-radius: 18px; backdrop-filter: blur(8px); overflow: hidden;
    cursor: default;
}
.faq:hover {
    border-color: var(--accent-30);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
}
.faq-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid rgba(70, 80, 110, 0.12); font-weight: 700; font-size: 13px; color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase; }
.faq-header i { color: var(--accent-bright); font-size: 14px; }
.faq-list { padding: 6px 0; }
.faq-item { border-bottom: 1px solid rgba(70, 80, 110, 0.08); }
.faq-item:last-child { border-bottom: none; }
.faq-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; cursor: pointer; list-style: none;
    transition: background 0.2s; min-height: 44px;
    -webkit-tap-highlight-color: transparent; user-select: none;
}
.faq-row:hover { background: var(--accent-06); }
.faq-item summary { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; list-style: none; transition: background 0.2s; min-height: 44px; }
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item summary:hover { background: var(--accent-06); }
/* Accordion body */
.faq-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease;
    padding: 0 16px;
}
.faq-body p { font-size: 12px; line-height: 1.65; color: var(--text-secondary); padding: 12px 0 14px; border-top: 1px solid rgba(70,80,110,0.1); margin: 0; }
.faq-body p strong { color: var(--text-primary); font-weight: 600; }
/* Open state */
.faq-item.open .faq-icon-wrap { background: var(--accent-22); }
.faq-item.open .faq-chevron { transform: rotate(180deg); color: var(--accent-bright); }
.faq-icon-wrap { width: 34px; height: 34px; border-radius: 10px; background: var(--accent-glow); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--accent-bright); flex-shrink: 0; transition: background 0.2s; }
.faq-question { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }
.faq-chevron { font-size: 11px; color: var(--text-tertiary); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); flex-shrink: 0; }

/* ═══════════════════════════════════════
   REFERRAL HERO (extracted from inline styles)
═══════════════════════════════════════ */
.referral-hero { text-align: center; padding: 20px 0 8px; }
.referral-hero-icon {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent-15), var(--accent-05));
    border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    box-shadow: 0 4px 16px var(--accent-12);
}
.referral-hero-icon i { font-size: 26px; color: var(--accent-bright); }
.referral-hero-title { font-size: 18px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.3px; }
.referral-hero-desc { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }
.accent-highlight { color: var(--accent-bright); font-weight: 700; }
.ref-link-row { display: flex; gap: 6px; align-items: center; }

/* ═══════════════════════════════════════
   MODAL DETAIL WRAP + PAY METHOD SUMMARY (extracted from inline styles)
═══════════════════════════════════════ */
.modal-detail-wrap {
    background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(70, 80, 110, 0.12);
    border-radius: 14px; padding: 4px 14px; margin-bottom: 4px;
}
.pay-method-summary {
    padding: 10px 14px 14px;
    background: var(--accent-07); border: 1px solid var(--accent-14);
    border-radius: 12px; margin-bottom: 14px;
}
.pay-method-summary-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
.pay-method-summary-row { display: flex; justify-content: space-between; align-items: center; }
.pay-method-summary-row span { font-size: 12px; color: var(--text-secondary); }
.pay-method-summary-row b { color: var(--text-primary); }
.pay-method-shortage { font-size: 14px !important; font-weight: 700; color: var(--accent-bright) !important; }

/* ═══════════════════════════════════════
   HOME — extracted inline styles
═══════════════════════════════════════ */
.no-sub-wrap { text-align: center; padding: 4px 0 8px; }
.sub-title-center { justify-content: center; margin-bottom: 8px; }
.connect-help-wrap { margin-top: 12px; }
.connect-help-arrow { font-size: 11px; color: rgba(255, 255, 255, 0.2); }
.quick-actions-title { margin-top: 16px; }
.trial-btn-margin { margin-top: 14px; }

/* ═══════════════════════════════════════
   SKELETON LOADER
═══════════════════════════════════════ */
.skeleton {
    background: linear-gradient(90deg, rgba(20, 25, 45, 0.2) 25%, var(--accent-08) 50%, rgba(20, 25, 45, 0.2) 75%);
    background-size: 200% 100%; animation: loading 1.2s infinite;
    border-radius: 16px; height: 60px; margin-bottom: 10px;
}
@keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
.toast {
    position: fixed;
    bottom: max(80px, calc(var(--safe-bottom) + 80px));
    left: 50%; transform: translateX(-50%) translateY(160px);
    background: rgba(20, 25, 45, 0.95); border: 1px solid rgba(70, 80, 110, 0.2);
    border-radius: 32px; padding: 10px 16px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 500; font-size: 13px; color: var(--accent-bright);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
    z-index: 9999; white-space: nowrap; max-width: 85vw;
    pointer-events: none; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ═══════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════ */
.confirm-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0, 0, 0, 0.5);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
}
.confirm-overlay.show { opacity: 1; pointer-events: auto; }
.confirm-box {
    background: var(--modal-bg); border: 1px solid rgba(80, 90, 130, 0.3);
    border-radius: 18px; padding: 24px 20px 16px;
    max-width: 300px; width: 85vw; text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    transform: scale(0.92); transition: transform 0.2s ease;
}
.confirm-overlay.show .confirm-box { transform: scale(1); }
.confirm-box p { color: var(--text-primary); font-size: 14px; line-height: 1.5; margin-bottom: 18px; }
.confirm-buttons { display: flex; gap: 10px; justify-content: center; }
.confirm-btn {
    padding: 10px 22px; border-radius: 12px; font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; font-family: var(--font-body);
    transition: transform 0.15s ease, background 0.2s ease;
    min-height: 42px;
}
.confirm-btn:active { transform: scale(0.96); }
.confirm-btn-cancel {
    background: rgba(30, 35, 55, 0.5); color: var(--text-secondary);
    border: 1px solid rgba(70, 80, 110, 0.2);
}
.confirm-btn-cancel:hover { background: rgba(40, 50, 75, 0.5); }
.confirm-btn-ok {
    background: linear-gradient(135deg, var(--accent-60), rgba(154, 143, 223, 0.4));
    color: white; border: 1px solid var(--accent-30);
}
.confirm-btn-ok:hover { background: linear-gradient(135deg, var(--accent-80), rgba(154, 143, 223, 0.6)); }

/* ═══════════════════════════════════════
   MODAL — bottom sheet style
═══════════════════════════════════════ */
.modal { display: none; position: fixed; inset: 0; z-index: 1500; justify-content: center; align-items: flex-end; padding: 0; }
.modal.show { display: flex; }
.modal-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px); }
.modal-content {
    max-width: 100%; width: 100%; padding: 0;
    border-radius: 24px 24px 0 0; position: relative; z-index: 1;
    background: rgba(14, 18, 38, 0.97); border: 1px solid rgba(80, 90, 130, 0.25);
    border-bottom: none; backdrop-filter: blur(20px);
    box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5);
    max-height: 92vh; overflow-y: auto;
    animation: modalSlideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
}
/* FIX v3 #8: Removed transform from hover to avoid conflict with drag-to-dismiss */
.modal-content:hover {
    box-shadow: 0 -12px 50px rgba(0, 0, 0, 0.6);
}
.modal-drag { display: flex; justify-content: center; padding: 14px 0 6px; }
.modal-drag-bar { width: 40px; height: 4px; background: rgba(120, 130, 160, 0.35); border-radius: 2px; }
.modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px 14px 20px;
    border-bottom: 1px solid rgba(70, 80, 110, 0.15);
}
.modal-header h3 {
    font-family: var(--font-display); font-size: 17px;
    color: var(--text-primary); font-weight: 700; margin: 0;
}
#modal-body { padding: 20px 20px 0 20px; }
#modal-buttons.modal-buttons { padding: 0 20px max(24px, calc(var(--safe-bottom) + 16px)) 20px; }
.modal-close {
    background: rgba(30, 35, 55, 0.5); border: 1px solid rgba(70, 80, 110, 0.2);
    border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.modal-close:hover { background: var(--accent-25); color: var(--accent-bright); }

/* Modal tariff name */
.modal-tariff-name {
    font-family: var(--font-body);
    font-size: 22px; font-weight: 300;
    color: var(--accent-bright);
    text-align: center;
    letter-spacing: 0.5px;
    padding: 0 0 16px;
}
/* Modal detail rows */
.modal-detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 1px solid rgba(70, 80, 110, 0.1); font-size: 13px;
}
.modal-detail-row:last-of-type { border-bottom: none; }
.modal-detail-label { color: var(--text-secondary); }
.modal-detail-value { color: var(--text-primary); font-weight: 600; }
.modal-detail-value.accent { color: var(--accent-bright); font-size: 17px; font-weight: 700; }

/* Modal balance warning */
.modal-balance-warn {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    background: rgba(255, 80, 80, 0.07);
    border: 1px solid rgba(255, 80, 80, 0.18);
    border-radius: 12px;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    margin-top: 12px;
}
.modal-balance-warn i { font-size: 15px; color: var(--danger); flex-shrink: 0; }
.modal-balance-warn .warn-balance { color: var(--text-primary); font-weight: 600; }
.modal-balance-warn .warn-short { color: var(--danger); font-weight: 700; }

/* Modal buttons */
.modal-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.modal-btn {
    border-radius: 14px; padding: 12px 16px; font-size: 14px; font-weight: 600;
    color: var(--text-primary); cursor: pointer; transition: all 0.25s;
    width: 100%; font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 46px;
    background: rgba(25, 30, 52, 0.8);
    border: 1px solid rgba(70, 80, 110, 0.2);
    text-align: center;
}
.modal-btn:hover {
    background: var(--accent-20); border-color: var(--accent-30);
    color: var(--accent-bright); transform: translateY(-1px);
}
.modal-btn-primary {
    height: 50px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    padding: 0 20px;
    width: calc(100% - 32px);
    margin: 0 16px 16px 16px;
    letter-spacing: 0.3px;
    box-shadow: 0 1px 4px var(--accent-20);
    background: linear-gradient(135deg, var(--accent-55), rgba(154, 143, 223, 0.45));
    border: 1px solid var(--accent-22);
    color: white;
    cursor: pointer;
    font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}
.modal-btn-primary:hover {
    background: linear-gradient(135deg, var(--accent-70), rgba(154, 143, 223, 0.6));
    box-shadow: 0 0 20px var(--accent-50), 0 0 8px var(--accent-30);
    border-color: var(--glass-border-hover);
    transform: translateY(-1px);
}

@keyframes modalSlideUp { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

<script>
'use strict';

/* ═══════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════ */
const SKELETON_DELAY_MS   = 250;
// FIX v3 #20: Increased from 950 to 1200ms for slow devices
const ANIM_CLEANUP_MS     = 1200;
const TOAST_DURATION_MS   = 3000;
const ANIM_SELECTORS      = '.anim-title,.anim-left,.anim-up,.anim-down,.anim-fade';
const DOUBLE_CLICK_PREVENT_MS = 500;

const PAYMENT_METHODS = {
    sbp:    { name: 'СБП',             desc: 'Система быстрых платежей',                icon: 'fa-university' },
    crypto: { name: 'CryptoBot',       desc: 'Криптовалютные платежи',                  icon: 'fa-coins'      },
    stars:  { name: 'Telegram Stars',  desc: 'Встроенная платёжная система Telegram',   icon: 'fa-star'       },
};

/* ═══════════════════════════════════════
   TELEGRAM WEBAPP INIT (with fallback)
═══════════════════════════════════════ */
const tg = window.Telegram?.WebApp;
const isTelegram = !!tg;

if (tg) {
    try { tg.setHeaderColor('#1a1635'); } catch {}
    try { tg.setBackgroundColor('#1a1635'); } catch {}
    try { tg.expand(); } catch {}
    try { tg.ready(); } catch {}
} else {
    console.warn('[NVX VPN] Открыто вне Telegram — некоторые функции недоступны');
}

/* ═══════════════════════════════════════
   HAPTIC FEEDBACK MODULE
═══════════════════════════════════════ */
const HapticFeedback = {
    buttonLight() { tg?.HapticFeedback?.impactOccurred?.('light'); },
    buttonMedium() { tg?.HapticFeedback?.impactOccurred?.('medium'); },
    navigation() { tg?.HapticFeedback?.impactOccurred?.('light'); },
    success() { tg?.HapticFeedback?.notificationOccurred?.('success'); },
    error() { tg?.HapticFeedback?.notificationOccurred?.('error'); },
    warning() { tg?.HapticFeedback?.notificationOccurred?.('warning'); },
    selection() { tg?.HapticFeedback?.selectionChanged?.(); }
};

/* ═══════════════════════════════════════
   DOUBLE-CLICK PREVENTION (with TTL cleanup)
═══════════════════════════════════════ */
const clickTimestamps = new Map();
const CLICK_TTL_MS = 10000;
// FIX v3 #8: Periodic cleanup every 5 seconds
setInterval(() => {
    const now = Date.now();
    for (const [key, ts] of clickTimestamps) {
        if (now - ts > CLICK_TTL_MS) clickTimestamps.delete(key);
    }
}, 5000);

function canProceed(actionId) {
    const now = Date.now();
    const lastClick = clickTimestamps.get(actionId) || 0;
    if (now - lastClick < DOUBLE_CLICK_PREVENT_MS) {
        return false;
    }
    clickTimestamps.set(actionId, now);
    return true;
}

/* ═══════════════════════════════════════
   PROMO CODES (test stubs)
   ╔══════════════════════════════════════════════════════════════╗
   ║  ⛔  SECURITY CRITICAL — УДАЛИТЬ ПЕРЕД ПРОДАКШЕНОМ!         ║
   ║  Все промокоды ДОЛЖНЫ валидироваться ТОЛЬКО на сервере.     ║
   ║  Клиентский код НЕ должен содержать ни кодов, ни бонусов.  ║
   ║  Пользователь может увидеть коды через DevTools и           ║
   ║  модифицировать баланс через консоль.                       ║
   ║  При подключении backend:                                   ║
   ║  1. Удалить VALID_PROMOS целиком                            ║
   ║  2. Заменить проверку на API.activatePromo(code)            ║
   ║  3. Обновить баланс из ответа сервера                       ║
   ╚══════════════════════════════════════════════════════════════╝
═══════════════════════════════════════ */
const VALID_PROMOS = {
    'NVX2026':  { bonus: 50,  desc: '+50₽ на баланс' },
    'WELCOME':  { bonus: 30,  desc: '+30₽ на баланс' },
    'FREEVPN':  { bonus: 100, desc: '+100₽ на баланс' },
};

/* ═══════════════════════════════════════
   DATA LAYER — готов к замене на API
═══════════════════════════════════════ */
const AppData = {
    user: {
        name: 'ONE_DAY',
        id: '641915862',
        balance: 0.00,
        avatar: null,
    },
    subscription: {
        active: false,
        trialAvailable: true,
    },
    referral: {
        total: 0,
        earned: 0,
        percent: 25,
        link: '',
    },
    tariffs: [
        { id: 1, days: 30,  price: 129, traffic_gb: 60,  ip_limit: 1 },
        { id: 2, days: 90,  price: 369, traffic_gb: 180, ip_limit: 2 },
        { id: 3, days: 180, price: 719, traffic_gb: 360, ip_limit: 3 },
    ],
    locations: [
        { code: 'LV', flag: '🇱🇻' }, { code: 'NL', flag: '🇳🇱' },
        { code: 'RU', flag: '🇷🇺' }, { code: 'US', flag: '🇺🇸' },
        { code: 'PL', flag: '🇵🇱' }, { code: 'KZ', flag: '🇰🇿' },
        { code: 'SE', flag: '🇸🇪' }, { code: 'TR', flag: '🇹🇷' },
        { code: 'UA', flag: '🇺🇦' },
    ],
    get nodesCount() { return this.locations.length; },
};

async function fetchAppData() {
    return AppData;
}

/* ═══════════════════════════════════════
   API LAYER — готов к подключению backend
═══════════════════════════════════════ */
const API = {
    BASE_URL: '/api',
    TIMEOUT_MS: 15000,

    async _request(endpoint, options = {}) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), this.TIMEOUT_MS);

        showLoading(options._loadingMsg || 'Загрузка...');
        try {
            const resp = await fetch(this.BASE_URL + endpoint, {
                ...options,
                signal: controller.signal,
                headers: {
                    'Content-Type': 'application/json',
                    ...(isTelegram && tg.initData ? { 'X-Telegram-Init-Data': tg.initData } : {}),
                    ...options.headers,
                },
            });
            clearTimeout(timeoutId);
            if (!resp.ok) {
                const errBody = await resp.json().catch(() => ({}));
                throw new Error(errBody.message || `HTTP ${resp.status}`);
            }
            return await resp.json();
        } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') {
                showToast('Превышено время ожидания', 'error');
            } else if (!navigator.onLine) {
                showToast('Нет подключения к интернету', 'error');
            } else {
                showToast(err.message || 'Ошибка сервера', 'error');
            }
            HapticFeedback.error();
            throw err;
        } finally {
            hideLoading();
        }
    },

    getUser() { return this._request('/user', { _loadingMsg: 'Загрузка профиля...' }); },
    getSubscription() { return this._request('/subscription'); },
    buySubscription(tariffId) {
        return this._request('/subscription', {
            method: 'POST',
            body: JSON.stringify({ tariff_id: safeInt(tariffId) }),
            _loadingMsg: 'Оформляем подписку...',
        });
    },
    activatePromo(code) {
        return this._request('/promo', {
            method: 'POST',
            body: JSON.stringify({ code: String(code).trim() }),
            _loadingMsg: 'Проверяем промокод...',
        });
    },
    getReferralStats() { return this._request('/referral'); },
    createPayment(method, amount) {
        return this._request('/payment', {
            method: 'POST',
            body: JSON.stringify({ method, amount: safeFloat(amount) }),
            _loadingMsg: 'Создаём платёж...',
        });
    },
};

/* ═══════════════════════════════════════
   DOM CACHE
═══════════════════════════════════════ */
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => ctx.querySelectorAll(sel);

const contentEl    = $('#content');
const toast        = $('#custom-toast');
const toastMsg     = $('#toast-message');
const toastIcon    = $('#toast-icon');
const modal        = $('#custom-modal');
const modalTitle   = $('#modal-title');
const modalBody    = $('#modal-body');
const modalButtons = $('#modal-buttons');
const modalClose   = $('#modal-close');

let currentTab = 'home';

/* ═══════════════════════════════════════
   XSS PROTECTION
═══════════════════════════════════════ */
function escapeHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function safeInt(n) { return parseInt(n, 10) || 0; }
function safeFloat(n) { return parseFloat(Number(n).toFixed(2)) || 0; }

/* ═══════════════════════════════════════
   ANIMATION CLEANUP
═══════════════════════════════════════ */
let cleanupTimer = null;
function registerAnimCleanup() {
    if (cleanupTimer) clearTimeout(cleanupTimer);
    cleanupTimer = setTimeout(() => {
        $$(ANIM_SELECTORS).forEach(el => el.classList.add('anim-done'));
        // FIX: Update tab cache with anim-done classes so cached HTML has hover-ready state
        if (currentTab && contentEl) {
            const cached = tabCache.get(currentTab);
            if (cached) cached.html = contentEl.innerHTML;
        }
        cleanupTimer = null;
    }, ANIM_CLEANUP_MS);
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer = null;
const TOAST_TYPES = {
    success: { icon: 'fa-check-circle',        border: 'var(--accent-40)', color: 'var(--accent-bright)' },
    error:   { icon: 'fa-exclamation-circle',   border: 'rgba(255,107,107,0.5)', color: '#ff6b6b' },
    warning: { icon: 'fa-exclamation-triangle', border: 'rgba(255,165,2,0.5)',   color: '#ffa502' },
};

function showToast(msg, type = 'success') {
    const cfg = TOAST_TYPES[type] || TOAST_TYPES.success;
    toastMsg.textContent = msg;
    toastIcon.className = `fas ${cfg.icon}`;
    toast.style.borderColor = cfg.border;
    toast.style.color = cfg.color;

    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
    toast.classList.add('show');
    toastTimer = setTimeout(() => { toast.classList.remove('show'); toastTimer = null; }, TOAST_DURATION_MS);
}

/* ═══════════════════════════════════════
   CLIPBOARD HELPER
═══════════════════════════════════════ */
async function copyToClipboard(text) {
    try {
        if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
        }
    } catch { /* fall through */ }
    try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        return true;
    } catch {
        return false;
    }
}

/* ═══════════════════════════════════════
   CUSTOM CONFIRM DIALOG
═══════════════════════════════════════ */
function showConfirmDialog(message) {
    return new Promise((resolve) => {
        const existing = document.getElementById('confirmDialog');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.id = 'confirmDialog';
        overlay.className = 'confirm-overlay';
        overlay.innerHTML = `
            <div class="confirm-box">
                <p>${escapeHtml(message)}</p>
                <div class="confirm-buttons">
                    <button type="button" class="confirm-btn confirm-btn-cancel" id="confirmCancel">Отмена</button>
                    <button type="button" class="confirm-btn confirm-btn-ok" id="confirmOk">OK</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);

        // FIX v3 #24: Add ARIA attributes to confirm dialog
        overlay.setAttribute('role', 'alertdialog');
        overlay.setAttribute('aria-modal', 'true');

        requestAnimationFrame(() => overlay.classList.add('show'));

        const cleanup = (result) => {
            overlay.classList.remove('show');
            setTimeout(() => { overlay.remove(); }, 200);
            resolve(result);
        };

        $('#confirmCancel', overlay).addEventListener('click', () => {
            HapticFeedback.buttonLight();
            cleanup(false);
        });
        $('#confirmOk', overlay).addEventListener('click', () => {
            HapticFeedback.buttonLight();
            cleanup(true);
        });
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) cleanup(false);
        });
    });
}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
let modalHasInput = false;
let modalDragStartY = 0;
let modalDragCurrentY = 0;
let modalIsDragging = false;

function hideModal() {
    if (modalHasInput) {
        showConfirmDialog('Закрыть? Введённые данные будут потеряны.').then(ok => {
            if (ok) {
                HapticFeedback.buttonLight();
                modal.classList.remove('show');
                modalHasInput = false;
            }
        });
        return;
    }
    HapticFeedback.buttonLight();
    modal.classList.remove('show');
    modalHasInput = false;
}

function showModal() {
    modal.classList.add('show');
    modalHasInput = false;
    const inputs = modalBody.querySelectorAll('input, textarea');
    inputs.forEach(inp => {
        inp.addEventListener('input', () => { modalHasInput = true; }, { once: true });
    });
}

modal?.setAttribute('role', 'dialog');
modal?.setAttribute('aria-modal', 'true');
modal?.setAttribute('aria-labelledby', 'modal-title');
modal?.setAttribute('aria-describedby', 'modal-body');

const modalContent = $('.modal-content');
const modalDragBar = $('.modal-drag-bar');

function onModalDragStart(e) {
    const touch = e.touches?.[0] || e;
    modalDragStartY = touch.clientY;
    modalIsDragging = true;
    modalContent.style.transition = 'none';
    document.addEventListener('mousemove', onModalDragMove);
    document.addEventListener('touchmove', onModalDragMove, { passive: true });
    document.addEventListener('mouseup', onModalDragEnd);
    document.addEventListener('touchend', onModalDragEnd);
}

function onModalDragMove(e) {
    if (!modalIsDragging) return;
    const touch = e.touches?.[0] || e;
    modalDragCurrentY = touch.clientY - modalDragStartY;
    if (modalDragCurrentY > 0) {
        modalContent.style.transform = `translateY(${modalDragCurrentY}px)`;
    }
}

function onModalDragEnd() {
    if (!modalIsDragging) return;
    modalIsDragging = false;
    modalContent.style.transition = '';
    // FIX v3 #9: Always reset transform regardless of confirm result
    modalContent.style.transform = '';
    document.removeEventListener('mousemove', onModalDragMove);
    document.removeEventListener('touchmove', onModalDragMove);
    document.removeEventListener('mouseup', onModalDragEnd);
    document.removeEventListener('touchend', onModalDragEnd);
    if (modalDragCurrentY > 100) {
        hideModal();
    }
    modalDragCurrentY = 0;
}

modalDragBar?.addEventListener('mousedown', onModalDragStart);
modalDragBar?.addEventListener('touchstart', onModalDragStart, { passive: true });

modalClose?.addEventListener('click', hideModal);
modal?.addEventListener('click', e => {
    if (e.target.classList.contains('modal-overlay')) hideModal();
});

// Keyboard trap
modal?.addEventListener('keydown', (e) => {
    if (!modal.classList.contains('show')) return;
    if (e.key === 'Escape') { hideModal(); return; }
    if (e.key !== 'Tab') return;
    const focusable = modal.querySelectorAll('button, input, textarea, [tabindex]:not([tabindex="-1"])');
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
});

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function switchTab(tab) {
    $$('.nav-item').forEach(b => {
        const isActive = b.dataset.tab === tab;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-current', isActive ? 'page' : 'false');
    });
    currentTab = tab;
    showTab(tab);
    if (isTelegram && tg.BackButton) {
        if (tab === 'home') tg.BackButton.hide();
        else tg.BackButton.show();
    }
}

function _navHandleTap(btn) {
    if (!btn || !btn.dataset.tab) return;
    HapticFeedback.navigation();
    btn.style.transform = 'scale(0.90)';
    setTimeout(() => { btn.style.transform = ''; }, 150);
    requestAnimationFrame(() => {
        switchTab(btn.dataset.tab);
    });
}

$$('.nav-item').forEach(btn => {
    let _touchHandled = false;
    btn.addEventListener('touchend', function(e) {
        e.preventDefault();
        _touchHandled = true;
        _navHandleTap(this);
        setTimeout(() => { _touchHandled = false; }, 500);
    }, { passive: false });
    btn.addEventListener('click', function() {
        if (_touchHandled) return;
        _navHandleTap(this);
    });
});

/* ═══════════════════════════════════════
   TAB ROUTER
═══════════════════════════════════════ */
const TAB_RENDERERS = {
    home:     renderHome,
    tariffs:  renderTariffs,
    referral: renderReferral,
    topup:    renderTopUp,
    support:  renderSupport,
};

let tabTimer = null;
let pendingRender = null;

const tabCache = new Map();
function invalidateTabCache(...tabs) {
    if (tabs.length === 0) { tabCache.clear(); return; }
    tabs.forEach(t => tabCache.delete(t));
}

function showTab(tab) {
    if (tabTimer) { clearTimeout(tabTimer); tabTimer = null; }
    if (pendingRender) { cancelAnimationFrame(pendingRender); pendingRender = null; }

    // Save scroll position
    if (currentTab && contentEl.scrollTop > 0) {
        const cached = tabCache.get(currentTab);
        if (cached) cached.scrollTop = contentEl.scrollTop;
    }

    contentEl.style.opacity = '0';
    contentEl.style.transform = 'translateY(10px)';
    contentEl.style.transition = 'none';
    contentEl.innerHTML = '';

    tabTimer = setTimeout(() => {
        tabTimer = null;

        const cached = tabCache.get(tab);
        if (cached) {
            contentEl.innerHTML = cached.html;
            // FIX: Immediately add anim-done to all animated elements from cache
            // This skips re-animation and unblocks CSS hover transitions
            $$(ANIM_SELECTORS, contentEl).forEach(el => el.classList.add('anim-done'));
            // FIX v3 #7: Restore scrollTop via rAF to ensure layout is ready
            requestAnimationFrame(() => {
                contentEl.scrollTop = cached.scrollTop || 0;
            });
        } else {
            const renderer = TAB_RENDERERS[tab];
            if (renderer) {
                try { renderer(); }
                catch (err) {
                    console.error(`[NVX] Ошибка рендера вкладки "${tab}":`, err);
                    contentEl.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки. Попробуйте ещё раз.</div>`;
                }
            }
            // Cache will be updated after animation cleanup to include anim-done
            tabCache.set(tab, { html: contentEl.innerHTML, scrollTop: 0 });
        }

        requestAnimationFrame(() => {
            contentEl.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
            contentEl.style.opacity = '1';
            contentEl.style.transform = 'translateY(0)';
            setTimeout(() => { contentEl.style.transition = ''; }, 250);
        });
    }, SKELETON_DELAY_MS);
}

/* ═══════════════════════════════════════
   CONTENT — event delegation
═══════════════════════════════════════ */
contentEl.addEventListener('click', e => {
    const target = e.target;

    const actionBtn = target.closest('.btn.action-row[data-action]');
    if (actionBtn && canProceed('action-' + actionBtn.dataset.action)) {
        HapticFeedback.buttonMedium();
        showToast('Доступно после подключения backend', 'warning');
        return;
    }

    if (target.closest('#connectHelpCard') && canProceed('connectHelp')) {
        HapticFeedback.buttonLight();
        showToast('Функция подключится после настройки backend');
        return;
    }

    const tariffCard = target.closest('.tariff-card[data-id]');
    if (tariffCard && canProceed('tariff-' + tariffCard.dataset.id)) {
        HapticFeedback.buttonMedium();
        openTariffModal(parseInt(tariffCard.dataset.id, 10));
        return;
    }

    const topupMethod = target.closest('.topup-method[data-method]');
    if (topupMethod && canProceed('topup-' + topupMethod.dataset.method)) {
        HapticFeedback.buttonMedium();
        const method = PAYMENT_METHODS[topupMethod.dataset.method];
        // FIX v3 #7 (original): Use method?.name instead of method object
        showToast(`Переход к оплате через ${method?.name || 'неизвестный метод'}`);
        return;
    }

    if (target.closest('#copyRef') && canProceed('copyRef')) {
        HapticFeedback.buttonLight();
        copyToClipboard(AppData.referral.link).then(ok => {
            showToast(ok ? 'Ссылка скопирована' : 'Не удалось скопировать', ok ? 'success' : 'error');
        });
        return;
    }

    if (target.closest('#promoBtn') && canProceed('promo')) {
        HapticFeedback.buttonMedium();
        const promoBtn = $('#promoBtn');
        const input = $('#promoInput');
        if (!input?.value.trim()) { showToast('Введите промокод', 'warning'); return; }

        if (promoBtn) { promoBtn.disabled = true; promoBtn.style.opacity = '0.5'; }
        const _enableBtn = () => { if (promoBtn) { promoBtn.disabled = false; promoBtn.style.opacity = ''; } };

        const code = input.value.trim().toUpperCase();
        const promo = VALID_PROMOS[code];
        if (promo) {
            AppData.user.balance += promo.bonus;
            updateHeader();
            invalidateTabCache('home', 'referral', 'topup');
            showToast(`Промокод активирован: ${escapeHtml(promo.desc)}`, 'success');
            HapticFeedback.success();
            input.value = '';
        } else {
            showToast('Промокод не найден', 'error');
            HapticFeedback.error();
        }
        _enableBtn();
        return;
    }

    if (target.closest('#buySubBtn') && canProceed('buySub')) {
        HapticFeedback.buttonMedium();
        switchTab('tariffs');
        return;
    }

    if (target.closest('#trialBtn') && canProceed('trial')) {
        HapticFeedback.buttonMedium();
        AppData.subscription.trialAvailable = false;
        AppData.subscription.active = true;
        invalidateTabCache();
        showToast('Тестовая подписка активирована', 'success');
        renderHome();
        return;
    }

    if ((target.closest('#withdrawCard') || target.closest('#withdrawBalance')) && canProceed('withdraw')) {
        HapticFeedback.buttonMedium();
        showToast('Доступно после подключения backend', 'warning');
        return;
    }

    if (target.closest('#supportChatBtn') && canProceed('support')) {
        HapticFeedback.buttonMedium();
        showToast('Открываем чат поддержки');
        return;
    }
});

                <div class="faq-item" data-i="${i}">

                        <div class="faq-icon-wrap"><i class="fas ${icon}"></i></div>
                        <span class="faq-question">${q}</span>

                    </div>
                    <div class="faq-body"><p>${a}</p></div>
                </div>`).join('')}
            </div>
        </div>
    `;
    registerAnimCleanup();

    const items = $$('.faq-item', contentEl);
    const heightCache = new Map();
    items.forEach(item => {
        const p = item.querySelector('.faq-body p');
        if (p) heightCache.set(item, p.scrollHeight + 28);
    });

    items.forEach(item => {
        const body = item.querySelector('.faq-body');
        item.querySelector('.faq-row').addEventListener('click', () => {
            const isOpen = item.classList.contains('open');
            items.forEach(o => {
                o.classList.remove('open');
                o.querySelector('.faq-body').style.maxHeight = '0';
            });
            if (!isOpen) {
                item.classList.add('open');
                body.style.maxHeight = (heightCache.get(item) || 200) + 'px';
            }
        });
    });
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function initApp() {
    if (isTelegram && tg.initDataUnsafe?.user) {
        const tgUser = tg.initDataUnsafe.user;
        if (tgUser.username) AppData.user.name = tgUser.username;
        if (tgUser.id) AppData.user.id = String(tgUser.id);
        if (tgUser.photo_url) {
            AppData.user.avatar = tgUser.photo_url;
            const avatarImg = $('#avatarImage');
            const avatarInitial = $('#userInitial');
            if (avatarImg) {
                avatarImg.src = tgUser.photo_url;
                avatarImg.style.display = 'block';
            }
            if (avatarInitial) avatarInitial.style.display = 'none';
        }
    }

    AppData.referral.link = `https://t.me/NVXvpn_bot?start=ref${AppData.user.id}`;
    updateHeader();

    if (isTelegram && tg.BackButton) {
        tg.BackButton.onClick(() => {
            HapticFeedback.navigation();
            if (currentTab !== 'home') {
                switchTab('home');
                tg.BackButton.hide();
            }
        });
    }

    if (isTelegram) {
        tg.onEvent('viewportChanged', ({ isStateStable }) => {
            if (!isStateStable) return;
            const content = $('.content');
            if (content) {
                if (tg.isExpanded) {
                    content.style.height = '';
                } else {
                    content.style.height = `${tg.viewportStableHeight - 120}px`;
                }
            }
        });
    }

    const _startParam = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('tab');
    const _validTabs = Object.keys(TAB_RENDERERS);
    const _initTab = (_startParam && _validTabs.includes(_startParam)) ? _startParam : 'home';

    if (_initTab !== 'home') {
        $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === _initTab));
        currentTab = _initTab;
        if (isTelegram && tg.BackButton) tg.BackButton.show();
    }

    showTab(_initTab);
}

/* ═══════════════════════════════════════
   LOADING OVERLAY
═══════════════════════════════════════ */
(function _injectLoadingStyles() {
    if (document.getElementById('loading-overlay-styles')) return;
    const s = document.createElement('style');
    s.id = 'loading-overlay-styles';
    s.textContent = `
        @keyframes loading-spin { to { transform: rotate(360deg); } }
        @keyframes loading-pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
        #loading-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(10, 14, 39, 0.75);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; pointer-events: all;
            opacity: 0; transition: opacity 0.25s ease;
            backdrop-filter: blur(4px);
        }
        #loading-overlay.visible { opacity: 1; }
        #loading-overlay .lo-spinner {
            width: 52px; height: 52px;
            border: 3px solid var(--accent-15);
            border-top-color: var(--accent-bright);
            border-radius: 50%;
            animation: loading-spin 0.8s linear infinite;
            will-change: transform;
        }
        #loading-overlay .lo-msg {
            color: #c8c2f0; font-size: 14px; font-weight: 500;
            letter-spacing: 0.3px; text-align: center;
            max-width: 220px; line-height: 1.5;
            animation: loading-pulse 2s ease-in-out infinite;
            font-family: var(--font-body);
        }
    `;
    document.head.appendChild(s);
})();

function showLoading(message = 'Загрузка...') {
    let overlay = document.getElementById('loading-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'loading-overlay';
        overlay.innerHTML = `<div class="lo-spinner"></div><span class="lo-msg">${escapeHtml(message)}</span>`;
        document.body.appendChild(overlay);
    } else {
        const msgEl = overlay.querySelector('.lo-msg');
        if (msgEl) msgEl.textContent = message;
        // FIX v3 #13: Don't clone spinner if already visible (prevents blink)
        if (!overlay.classList.contains('visible')) {
            const old = overlay.querySelector('.lo-spinner');
            if (old) old.replaceWith(old.cloneNode(true));
        }
    }
    overlay.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('visible')));
}

function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) {
        overlay.classList.remove('visible');
        setTimeout(() => { overlay.style.display = 'none'; }, 250);
    }
}

function _hideSplash() {
    setTimeout(() => {
        const splash = document.getElementById('nvx-splash');
        if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => { splash.style.display = 'none'; }, 500);
        }
    }, 1550);
}

    initApp();
} catch (err) {
    console.error('[NVX] Критическая ошибка инициализации:', err);
    contentEl.innerHTML = `

            <button type="button" class="btn primary error-message-action" onclick="location.reload()">
                <i class="fas fa-redo"></i> Перезагрузить
            </button>
        </div>`;
}
_hideSplash();
