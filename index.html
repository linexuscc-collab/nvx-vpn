<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NVX VPN</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-dark: #0a0e27;
    --accent: #7a6fbf;
    --accent-bright: #9a8fdf;
    --text-primary: #e5e5f0;
    --text-secondary: #9a9fb5;
    --text-tertiary: #6a7080;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;}
body{
    font-family:var(--font-body);
    background:linear-gradient(135deg,#000 0%,#0a0e27 50%,#000 100%);
    color:var(--text-primary);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
.ui-layer{
    display:flex;flex-direction:column;
    height:100%;width:100%;
    padding-left:max(12px,var(--safe-left));
    padding-right:max(12px,var(--safe-right));
    overflow:hidden;
}

/* ═══════════════════════════════════════
   ENTRANCE ANIMATIONS — как в Envy VPN
   Амплитуда 15px, длительность 0.6s ease-out
═══════════════════════════════════════ */
@keyframes nvxFadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
@keyframes nvxSlideDown{
    from{opacity:0;transform:translateY(-15px);}
    to{opacity:1;transform:translateY(0);}
}
@keyframes nvxSlideUp{
    from{opacity:0;transform:translateY(15px);}
    to{opacity:1;transform:translateY(0);}
}
@keyframes nvxSlideLeft{
    from{opacity:0;transform:translateX(-15px);}
    to{opacity:1;transform:translateX(0);}
}

/* Базовые классы — opacity:0 до старта */
.anim-title,.anim-left,.anim-up,.anim-down,.anim-fade{
    opacity:0;
    will-change:opacity;
}

/* Задержки — как в Envy VPN */
.anim-d0{animation-delay:0.00s;}
.anim-d1{animation-delay:0.05s;}
.anim-d2{animation-delay:0.1s;}
.anim-d3{animation-delay:0.15s;}
.anim-d4{animation-delay:0.2s;}
.anim-d5{animation-delay:0.25s;}
.anim-d6{animation-delay:0.3s;}

/* Старые классы задержек — совместимость с Envy-style */
.anim-title{animation:nvxSlideDown 0.6s ease-out both;}
.anim-left{animation:nvxSlideLeft 0.6s ease-out both;}
.anim-left-d1{animation-delay:0.05s;}
.anim-left-d2{animation-delay:0.1s;}
.anim-left-d3{animation-delay:0.15s;}
.anim-up{animation:nvxSlideUp 0.6s ease-out both;}
.anim-up-d1{animation-delay:0.05s;}
.anim-up-d2{animation-delay:0.1s;}
.anim-up-d3{animation-delay:0.15s;}
.anim-up-d4{animation-delay:0.2s;}
.anim-up-d5{animation-delay:0.25s;}
.anim-up-d6{animation-delay:0.3s;}
.anim-down{animation:nvxSlideDown 0.6s ease-out both;}
.anim-down-d1{animation-delay:0.05s;}
.anim-down-d2{animation-delay:0.1s;}
.anim-down-d3{animation-delay:0.15s;}
.anim-fade{animation:nvxFadeIn 0.6s ease-out both;}
.anim-fade-d1{animation-delay:0.05s;}
.anim-fade-d2{animation-delay:0.1s;}
.anim-fade-d3{animation-delay:0.15s;}
.anim-fade-d4{animation-delay:0.2s;}
.anim-fade-d5{animation-delay:0.25s;}
.anim-fade-d6{animation-delay:0.3s;}

/* anim-done: сбрасываем анимацию — hover свободен */
.anim-done{
    animation:none !important;
    opacity:1 !important;
    transform:none !important;
    will-change:auto !important;
}
/* Но hover должен переопределить transform — поэтому
   все hover используют !important на transform */

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;
    margin-top:max(10px,var(--safe-top));
    margin-bottom:8px;
    flex-shrink:0;
    background:rgba(20,25,45,0.25);
    border:1px solid rgba(70,80,110,0.15);
    border-radius:20px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    transition:var(--transition);
    cursor:default;
}
.header:hover{
    transform:translateY(-2px) !important;
    border-color:rgba(122,111,191,0.35);
    background:rgba(25,32,58,0.35);
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
}
.user-info{display:flex;align-items:center;gap:10px;min-width:0;}
.avatar{
    width:40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,rgba(122,111,191,0.6),rgba(154,143,223,0.4));
    display:flex;align-items:center;justify-content:center;
    font-size:16px;color:white;font-weight:700;
    flex-shrink:0;border:1px solid rgba(122,111,191,0.3);overflow:hidden;
}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:none;}
.user-details{display:flex;flex-direction:column;gap:2px;min-width:0;}
.user-name{font-weight:700;font-size:14px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-id{font-size:11px;color:var(--text-secondary);}
.balance{
    display:flex;align-items:center;gap:6px;
    padding:6px 12px;background:rgba(30,35,55,0.3);
    border-radius:28px;font-weight:600;font-size:13px;
    border:1px solid rgba(70,80,110,0.2);
    color:var(--text-primary);flex-shrink:0;cursor:pointer;
    transition:var(--transition);
}
.balance:hover{background:rgba(40,50,75,0.4);}
.balance i{font-size:14px;color:var(--accent-bright);}

/* ═══════════════════════════════════════
   CONTENT
═══════════════════════════════════════ */
.content{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:2px 0 8px;
    scrollbar-width:none;-ms-overflow-style:none;
    -webkit-overflow-scrolling:touch;
}
.content::-webkit-scrollbar{display:none;}

.section-title{
    font-family:var(--font-display);
    font-size:21px;font-weight:700;
    margin:6px 0 12px;padding-bottom:6px;
    color:var(--text-primary);letter-spacing:-0.5px;
    position:relative;display:block;
}
.section-title::after{
    content:'';position:absolute;bottom:0;left:0;
    width:40px;height:2px;
    background:linear-gradient(90deg,var(--accent-bright),transparent);
    border-radius:2px;
}
.section-subtitle{
    font-size:12px;font-weight:600;
    margin:14px 0 10px;color:var(--text-secondary);
    text-transform:uppercase;letter-spacing:0.8px;
    display:flex;align-items:center;gap:6px;
}

.glass{
    background:rgba(15,18,40,0.55);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(80,90,130,0.25);border-radius:20px;
    transition:var(--transition);
}
.glass:hover{border-color:rgba(122,111,191,0.4);}

/* Connect Help Card */
.connect-help-card:hover{
    border-color:rgba(122,111,191,0.3) !important;
    transform:translateY(-1px) !important;
    background:rgba(25,32,58,0.4) !important;
}

/* ═══════════════════════════════════════
   SUBSCRIPTION CARD
═══════════════════════════════════════ */
.subscription-card{
    padding:16px;margin-bottom:12px;
    position:relative;overflow:hidden;
    background:rgba(15,18,40,0.55);
    border:1px solid rgba(80,90,130,0.25);
    border-radius:20px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
               border-color 0.28s ease,
               box-shadow 0.28s ease;
    cursor:default;
}
.subscription-card:hover{
    transform:translateY(-2px) !important;
    border-color:rgba(122,111,191,0.4);
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
}
.subscription-card .title{
    font-family:var(--font-display);font-size:16px;font-weight:700;
    margin-bottom:12px;color:var(--accent-bright);
    display:flex;align-items:center;gap:8px;
}
.subscription-card .title i{font-size:18px;}
.subscription-card .detail{
    display:flex;align-items:center;gap:10px;
    font-size:12px;margin-bottom:6px;
    color:var(--text-secondary);
    padding:4px 0;border-bottom:1px solid rgba(70,80,110,0.1);
    transition:var(--transition);
}
.subscription-card .detail:last-of-type{border-bottom:none;}
.subscription-card .detail i{width:16px;color:var(--accent-bright);font-size:12px;flex-shrink:0;}
.subscription-card .detail .value{color:var(--text-primary);font-weight:600;margin-left:auto;}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn{
    border:none;border-radius:18px;padding:10px 18px;
    font-weight:600;font-size:13px;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    cursor:pointer;transition:var(--transition);
    font-family:var(--font-body);white-space:nowrap;
    min-height:44px;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.97);}
.btn.primary{
    background:linear-gradient(135deg,rgba(122,111,191,0.7),rgba(154,143,223,0.5));
    color:white;border:1px solid rgba(122,111,191,0.3);
    backdrop-filter:blur(8px);box-shadow:0 4px 12px rgba(122,111,191,0.15);
}
.btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(122,111,191,0.2);}
.btn.secondary{
    background:rgba(30,35,55,0.3);border:1px solid rgba(70,80,110,0.2);
    color:var(--text-secondary);backdrop-filter:blur(8px);
}
.btn.secondary:hover{background:rgba(40,50,75,0.4);color:var(--accent-bright);}

.progress-bar{height:4px;background:rgba(70,80,110,0.15);border-radius:2px;margin:8px 0 6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(122,111,191,0.6),rgba(154,143,223,0.4));border-radius:2px;transition:width 0.4s ease;}

.action-buttons{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.btn.action-row{
    display:flex;flex-direction:row;align-items:center;gap:12px;
    padding:12px 14px;border-radius:16px;text-align:left;
    justify-content:flex-start;width:100%;
    background:rgba(20,25,45,0.3)!important;
    border:1px solid rgba(70,80,110,0.2);
    box-shadow:none!important;color:var(--text-primary);
    transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
               border-color 0.28s ease,
               background 0.28s ease !important;
}
.btn.action-row:hover{
    background:rgba(122,111,191,0.1)!important;
    border-color:rgba(122,111,191,0.25)!important;
    transform:translateY(-2px)!important;
    box-shadow:0 4px 14px rgba(0,0,0,0.2)!important;
}
.action-icon-wrap{
    width:42px;height:42px;border-radius:12px;
    background:rgba(70,80,110,0.15);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;color:var(--accent-bright);transition:var(--transition);
}
.btn.action-row:hover .action-icon-wrap{background:rgba(122,111,191,0.15);transform:scale(1.08);}
.action-text-wrap{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;}
.action-label{font-weight:700;font-size:14px;color:var(--text-primary);}
.action-desc{font-size:11px;color:rgba(255,255,255,0.5);}
.action-arrow{font-size:11px;color:rgba(255,255,255,0.35);flex-shrink:0;}

/* ═══════════════════════════════════════
   TARIFF CARDS
═══════════════════════════════════════ */
.tariffs-list{display:flex;flex-direction:column;gap:10px;}
.tariff-card{
    padding:13px 14px;cursor:pointer;
    transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
               border-color 0.28s ease,
               box-shadow 0.28s ease,
               background 0.28s ease;
    position:relative;overflow:hidden;
    background:rgba(20,25,45,0.25);
    border:1px solid rgba(70,80,110,0.18);
    border-radius:18px;backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    display:flex;flex-direction:column;gap:9px;
}
.tariff-card:hover{background:rgba(30,40,65,0.35);border-color:rgba(122,111,191,0.35);transform:translateY(-2px) !important;box-shadow:0 6px 20px rgba(0,0,0,0.25);}
.tariff-card-header{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.tariff-card-days{display:flex;align-items:baseline;gap:4px;}
.tariff-days-num{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--text-primary);line-height:1;}
.tariff-days-label{font-size:12px;color:var(--text-secondary);font-weight:500;}
.tariff-card-price{
    display:flex;align-items:baseline;gap:2px;
    background:rgba(122,111,191,0.12);border:1px solid rgba(122,111,191,0.2);
    border-radius:10px;padding:4px 12px;flex-shrink:0;
}
.tariff-price-num{font-family:var(--font-display);font-size:17px;font-weight:800;color:var(--accent-bright);line-height:1;}
.tariff-price-cur{font-size:12px;color:var(--accent);font-weight:600;}
.tariff-card-features{display:flex;gap:6px;flex-wrap:wrap;}
.tariff-feature{
    display:flex;align-items:center;gap:4px;font-size:11px;
    color:var(--text-secondary);background:rgba(30,35,55,0.4);
    border:1px solid rgba(70,80,110,0.15);border-radius:7px;padding:3px 8px;font-weight:500;
}
.tariff-feature i{color:var(--accent-bright);font-size:10px;width:12px;text-align:center;}
.tariff-locations{border-top:1px solid rgba(70,80,110,0.12);padding-top:8px;display:flex;flex-direction:column;gap:5px;}
.tariff-locations-label{font-size:10px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;display:flex;align-items:center;gap:5px;}
.tariff-locations-label i{color:var(--accent);font-size:10px;}
.tariff-countries{display:flex;flex-wrap:wrap;gap:5px;}
.country-flag{
    font-size:22px;
    display:inline-flex;align-items:center;justify-content:center;
    width:32px;height:32px;
    border-radius:8px;
    background:rgba(30,35,55,0.4);
    border:1px solid rgba(70,80,110,0.15);
    transition:all 0.22s;
    cursor:default;
    line-height:1;
}
.country-flag:hover{background:rgba(122,111,191,0.15);border-color:rgba(122,111,191,0.3);transform:scale(1.12);}
.tariff-locations-note{
    font-size:10px;color:var(--accent-bright);
    background:rgba(122,111,191,0.08);border:1px solid rgba(122,111,191,0.15);
    border-radius:7px;padding:4px 8px;display:flex;align-items:center;gap:5px;font-weight:500;
}
.tariff-card-btn{
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:9px;background:linear-gradient(135deg,rgba(122,111,191,0.5),rgba(154,143,223,0.3));
    border:1px solid rgba(122,111,191,0.3);border-radius:11px;
    font-size:13px;font-weight:700;color:white;transition:all 0.2s;
}
.tariff-card:hover .tariff-card-btn{background:linear-gradient(135deg,rgba(122,111,191,0.7),rgba(154,143,223,0.5));}

/* ═══════════════════════════════════════
   STATS GRID
═══════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-card{
    padding:12px 8px;text-align:center;border-radius:16px;
    background:rgba(20,25,45,0.2);border:1px solid rgba(70,80,110,0.15);
    backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;gap:4px;
    transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
               border-color 0.28s ease,
               box-shadow 0.28s ease,
               background 0.28s ease;
    cursor:default;
}
.stat-card:hover{
    transform:translateY(-2px) !important;border-color:rgba(122,111,191,0.35);
    background:rgba(25,32,58,0.35);box-shadow:0 4px 14px rgba(0,0,0,0.2);
}
.stat-icon{font-size:20px;color:var(--accent-bright);}
.stat-label{font-size:9px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.stat-value{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--accent-bright);}

/* REF LINK */
.ref-link{
    padding:14px;margin-bottom:14px;
    background:rgba(20,25,45,0.2);border:1px solid rgba(70,80,110,0.15);
    border-radius:18px;backdrop-filter:blur(8px);
    transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
               border-color 0.28s ease,
               box-shadow 0.28s ease;
    cursor:default;
}
.ref-link:hover{
    transform:translateY(-2px) !important;border-color:rgba(122,111,191,0.35);
    box-shadow:0 4px 14px rgba(0,0,0,0.2);
}
.ref-link p{font-size:12px;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:600;}
.copy-btn{
    width:44px;height:44px;border-radius:28px;
    background:rgba(122,111,191,0.5);border:1px solid rgba(122,111,191,0.3);
    color:white;font-size:14px;cursor:pointer;transition:var(--transition);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.copy-btn:hover{transform:scale(1.05);background:rgba(122,111,191,0.6);}

/* TOPUP — мгновенный hover */
.topup-method{
    padding:12px 14px;display:flex;align-items:center;gap:12px;
    border-radius:16px;background:rgba(20,25,45,0.2);
    border:1px solid rgba(70,80,110,0.15);
    transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),
               border-color 0.15s ease,
               box-shadow 0.15s ease,
               background 0.15s ease;
    cursor:pointer;position:relative;overflow:hidden;
    backdrop-filter:blur(8px);min-height:48px;margin-bottom:8px;
}
.topup-method:hover{
    border-color:rgba(122,111,191,0.3);
    background:rgba(30,40,60,0.35);
    transform:translateY(-2px) !important;
    box-shadow:0 4px 14px rgba(0,0,0,0.2);
}
.topup-method i:first-child{font-size:20px;color:var(--accent-bright);width:24px;flex-shrink:0;}
.topup-method span{flex:1;font-weight:600;color:var(--text-primary);font-size:13px;}
.topup-method i:last-child{font-size:12px;color:var(--text-secondary);}

/* PROMO — мгновенный hover без задержек */
.promo-section{
    background:rgba(122,111,191,0.08);border:1px solid rgba(122,111,191,0.18);
    border-radius:18px;padding:14px;margin-bottom:14px;
    transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
               border-color 0.18s ease,
               box-shadow 0.18s ease,
               background 0.18s ease;
    cursor:default;
}
.promo-section:hover{
    transform:translateY(-2px) !important;border-color:rgba(122,111,191,0.35);
    background:rgba(122,111,191,0.12);box-shadow:0 4px 14px rgba(0,0,0,0.2);
}
.promo-section p{font-size:12px;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:600;}
.promo-section p i{color:var(--accent-bright);}
.promo-row{display:flex;gap:8px;}
.promo-input{
    flex:1;background:rgba(0,0,0,0.2);border:1px solid rgba(70,80,110,0.2);
    border-radius:12px;padding:11px 14px;color:var(--text-primary);
    font-size:13px;outline:none;font-family:var(--font-body);transition:border-color 0.2s;
}
.promo-input::placeholder{color:var(--text-tertiary);}
.promo-input:focus{border-color:rgba(122,111,191,0.4);}
.promo-btn{
    padding:11px 16px;background:linear-gradient(135deg,rgba(122,111,191,0.7),rgba(154,143,223,0.5));
    border:none;border-radius:12px;color:white;font-size:13px;font-weight:600;
    cursor:pointer;white-space:nowrap;font-family:var(--font-body);transition:var(--transition);
}

let cleanupTimer = null;
function registerAnimCleanup() {
    if(cleanupTimer) clearTimeout(cleanupTimer);

    cleanupTimer = setTimeout(() => {
        document.querySelectorAll('.anim-title,.anim-left,.anim-up,.anim-down,.anim-fade').forEach(el => {

function showToast(msg, type='success') {
    toastMsg.textContent = msg;

        toast.style.borderColor='rgba(255,107,107,0.5)';

updateHeader();

    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));

}

});

// ── TABS ──
let tabTimer = null;

        tabTimer = null;
        switch(tab){
            case 'home':     renderHome();     break;
            case 'tariffs':  renderTariffs();  break;
            case 'referral': renderReferral(); break;

}

            <div class="detail"><i class="fas fa-hourglass-end"></i> Дней осталось <span class="value">1 день</span></div>
            <div class="detail"><i class="fas fa-database"></i> Трафик всего <span class="value">48 ГБ <span style="font-size:10px;color:var(--text-tertiary);">(1.5 ГБ на лок.)</span></span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:5%"></div></div>

// ── TARIFFS — анимация снизу вверх stagger ──
function renderTariffs() {
    const locs = DEMO.locations;
    const n = DEMO.nodesCount;
    const delays = ['anim-up-d1','anim-up-d2','anim-up-d3'];

    contentEl.innerHTML = `
        <div class="section-title anim-title">Выберите тариф</div>
        <div class="tariffs-list">
            ${DEMO.tariffs.map((t,i) => `
            <div class="tariff-card anim-up ${delays[i]}" data-id="${t.id}">
                <div class="tariff-card-header">
                    <div class="tariff-card-days">
                        <span class="tariff-days-num">${t.days}</span>
                        <span class="tariff-days-label">дней</span>
                    </div>
                    <div class="tariff-card-price">
                        <span class="tariff-price-num">${t.stars}</span>
                        <span class="tariff-price-cur">₽</span>
                    </div>
                </div>
                <div class="tariff-card-features">
                    <div class="tariff-feature"><i class="fas fa-database"></i><span>${t.traffic_gb * n} ГБ</span></div>
                    <div class="tariff-feature"><i class="fas fa-mobile-alt"></i><span>${t.ip_limit * n} уст. <span style="font-size:9px;color:var(--text-tertiary);">(${t.ip_limit} на лок.)</span></span></div>
                    <div class="tariff-feature"><i class="fas fa-bolt"></i><span>VLESS</span></div>
                </div>
                <div class="tariff-locations">
                    <div class="tariff-locations-label"><i class="fas fa-map-marker-alt"></i> Страны в подписке</div>
                    <div class="tariff-countries">${locs.map(l=>`<span class="country-flag" title="${l.code}">${l.flag}</span>`).join('')}</div>
                    <div class="tariff-locations-note"><i class="fas fa-info-circle"></i> ${t.traffic_gb} ГБ на локацию · всего ${t.traffic_gb * n} ГБ</div>
                </div>
                <div class="tariff-card-btn">Выбрать <i class="fas fa-arrow-right"></i></div>
            </div>`).join('')}
        </div>
    `;

    document.querySelectorAll('.tariff-card').forEach(card=>{
        card.addEventListener('click',()=>{
            const t = DEMO.tariffs.find(x=>x.id===parseInt(card.dataset.id));
            const n = DEMO.nodesCount;
            const bal = parseFloat(DEMO.balance);
            const diff = Math.ceil(t.stars - bal);
            const notEnough = bal < t.stars;

            modalTitle.textContent = 'Подтверждение покупки';

            // FIX: "30 дней доступа" + минималистичный шрифт Inter Light
            modalBody.innerHTML = `
                <div class="modal-tariff-name">${t.days} дней доступа</div>
                <div style="background:rgba(0,0,0,0.15);border:1px solid rgba(70,80,110,0.12);border-radius:14px;padding:4px 14px;margin-bottom:4px;">
                    <div class="modal-detail-row">
                        <span class="modal-detail-label">Трафик</span>
                        <span class="modal-detail-value">${t.traffic_gb * n} ГБ <span style="font-size:10px;color:var(--text-tertiary);">(${t.traffic_gb} ГБ на лок.)</span></span>
                    </div>
                    <div class="modal-detail-row">
                        <span class="modal-detail-label">Устройства</span>
                        <span class="modal-detail-value">${t.ip_limit * n} <span style="font-size:10px;color:var(--text-tertiary);">(${t.ip_limit} на лок.)</span></span>
                    </div>
                    <div class="modal-detail-row">
                        <span class="modal-detail-label">Стоимость</span>
                        <span class="modal-detail-value accent">${t.stars}₽</span>
                    </div>
                </div>
                ${notEnough ? `
                <div class="modal-balance-warn">
                    <i class="fas fa-wallet"></i>
                    <span>На балансе <span class="warn-balance">${bal.toFixed(2)}₽</span> — не хватает <span class="warn-short">${diff}₽</span></span>
                </div>` : ''}
            `;

            modalButtons.innerHTML = '';
            const btn = document.createElement('button');
            btn.innerHTML = `<i class="fas fa-credit-card"></i> Оплатить ${t.stars}₽`;
            // Задаём стили через setProperty с 'important' — это единственный надёжный способ
            const btnStyles = {
                'min-height': '46px',
                'height': '46px',
                'border-radius': '14px',
                'font-size': '14px',
                'font-weight': '600',
                'padding': '0 16px',
                'width': '100%',
                'display': 'flex',
                'align-items': 'center',
                'justify-content': 'center',
                'gap': '8px',
                'background': 'linear-gradient(135deg,rgba(122,111,191,0.85),rgba(154,143,223,0.65))',
                'border': '1px solid rgba(122,111,191,0.5)',
                'color': 'white',
                'cursor': 'pointer',
                'font-family': 'Inter, sans-serif',
                'letter-spacing': '0.2px',
                'box-shadow': '0 4px 16px rgba(122,111,191,0.25)',
                'transition': 'transform 0.25s ease, box-shadow 0.25s ease',
            };
            Object.entries(btnStyles).forEach(([k,v]) => btn.style.setProperty(k, v, 'important'));
            btn.addEventListener('mouseenter',()=>{
                btn.style.setProperty('transform','translateY(-2px)','important');
                btn.style.setProperty('box-shadow','0 8px 24px rgba(122,111,191,0.4)','important');
            });
            btn.addEventListener('mouseleave',()=>{
                btn.style.setProperty('transform','none','important');
                btn.style.setProperty('box-shadow','0 4px 16px rgba(122,111,191,0.25)','important');
            });
            btn.addEventListener('click',()=>{
                hideModal();
                if(notEnough){ switchTab('topup'); }
                else { showToast('Доступно после подключения backend','warning'); }
            });
            modalButtons.appendChild(btn);
            modal.classList.add('show');
        });
    });
    registerAnimCleanup();
}

        <div class="anim-up anim-up-d2" style="display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:rgba(122,111,191,0.06);border:1px solid rgba(122,111,191,0.12);border-radius:14px;margin-bottom:14px;">

    document.querySelectorAll('.topup-method').forEach(method=>{
