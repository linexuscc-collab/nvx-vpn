<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1635">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NVX VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════ */
:root {
    --bg-dark: #0a0e27;
    --bg-body: #1a1635;
    --accent: #7a6fbf;
    --accent-bright: #9a8fdf;
    --text-primary: #e5e5f0;
    --text-secondary: #9a9fb5;
    --text-tertiary: #6a7080;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    --transition-fast: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    --glass-bg: rgba(18, 22, 48, 0.35);
    --glass-bg-hover: rgba(22, 28, 58, 0.45);
    --glass-border: rgba(100, 115, 155, 0.2);
    --glass-border-hover: rgba(122, 111, 191, 0.4);
    --card-bg: rgba(20, 25, 45, 0.25);
    --card-border: rgba(70, 80, 110, 0.15);
    --card-border-hover: rgba(122, 111, 191, 0.35);
    --card-shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.25);
    --accent-glow: rgba(122, 111, 191, 0.12);
    --accent-border: rgba(122, 111, 191, 0.2);
    --danger: #ff6b6b;
    --warning: #ffa502;
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
    font-family: var(--font-body);
    background: var(--bg-body);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
}

/* ═══════════════════════════════════════
   3D SPACE BACKGROUND
═══════════════════════════════════════ */
#space-bg {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse at 50% 50%, var(--bg-body) 0%, #0a0a1a 50%, #000 100%);
    overflow: hidden;
}
#space-bg::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(122, 111, 191, 0.15) 0%, transparent 60%);
    filter: blur(60px);
    animation: pulseGlow 8s ease-in-out infinite;
}
@keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
}
@keyframes accentPulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
}
@keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
.space-orb {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%,
        rgba(122, 111, 191, 0.6) 0%,
        rgba(154, 143, 223, 0.4) 30%,
        rgba(76, 66, 141, 0.25) 50%,
        rgba(30, 25, 65, 0.1) 70%,
        transparent 100%);
    filter: blur(50px);
    animation: orbFloat 20s ease-in-out infinite;
    box-shadow: 0 0 100px rgba(122, 111, 191, 0.3), inset 0 0 60px rgba(154, 143, 223, 0.2);
    will-change: transform;
    contain: layout;
}
.space-orb-1 { width: 600px; height: 600px; top: -200px; left: -200px; animation-duration: 25s; }
.space-orb-2 { width: 500px; height: 500px; top: 50%; right: -150px; animation-delay: -8s; animation-duration: 30s; }
.space-orb-3 { width: 450px; height: 450px; bottom: -100px; left: 30%; animation-delay: -15s; animation-duration: 28s; }
.space-orb-4 { width: 350px; height: 350px; top: 30%; left: 40%; animation-delay: -5s; animation-duration: 35s; }

@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    25% { transform: translate(50px, -80px) rotate(90deg) scale(1.1); }
    50% { transform: translate(-30px, 60px) rotate(180deg) scale(0.95); }
    75% { transform: translate(80px, 40px) rotate(270deg) scale(1.05); }
}
.space-stars {
    position: absolute; inset: 0;
    background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(2px 2px at 60% 70%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 50% 20%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(1px 1px at 80% 10%, rgba(255, 255, 255, 0.15), transparent),
        radial-gradient(2px 2px at 90% 60%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 33% 50%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(2px 2px at 15% 80%, rgba(255, 255, 255, 0.2), transparent);
    background-size: 200% 200%;
    animation: starsTwinkle 8s ease-in-out infinite;
    opacity: 0.5;
}
@keyframes starsTwinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.02); }
}

/* Reduce animation load for users who prefer reduced motion or low-end devices */
@media (prefers-reduced-motion: reduce) {
    .space-orb, .space-stars, #space-bg::before { animation: none !important; }
    .support-icon { animation: none !important; }
}
/* Hide extra orbs on small/low-end screens to save GPU */
@media (max-width: 400px) {
    .space-orb-3, .space-orb-4 { display: none; }
}

/* ═══════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════ */
#app { position: fixed; inset: 0; display: flex; flex-direction: column; }
.ui-layer {
    display: flex; flex-direction: column;
    height: 100%; width: 100%;
    padding-left: max(12px, var(--safe-left));
    padding-right: max(12px, var(--safe-right));
    overflow: hidden;
}

/* ═══════════════════════════════════════
   ENTRANCE ANIMATIONS
   Amplitude: 15px, Duration: 0.6s ease-out
═══════════════════════════════════════ */
@keyframes nvxFadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes nvxSlideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes nvxSlideUp   { from { opacity: 0; transform: translateY(15px); }  to { opacity: 1; transform: translateY(0); } }
@keyframes nvxSlideLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

/* Base animation classes — start invisible */
.anim-title, .anim-left, .anim-up, .anim-down, .anim-fade { opacity: 0; }

/* Animation types */
.anim-title { animation: nvxSlideDown 0.6s ease-out both; }
.anim-left  { animation: nvxSlideLeft 0.6s ease-out both; }
.anim-up    { animation: nvxSlideUp 0.6s ease-out both; }
.anim-down  { animation: nvxSlideDown 0.6s ease-out both; }
.anim-fade  { animation: nvxFadeIn 0.6s ease-out both; }

/* Stagger delays — generated for each animation type */
.anim-d0 { animation-delay: 0s; }     .anim-d1 { animation-delay: 0.05s; }
.anim-d2 { animation-delay: 0.1s; }   .anim-d3 { animation-delay: 0.15s; }
.anim-d4 { animation-delay: 0.2s; }   .anim-d5 { animation-delay: 0.25s; }
.anim-d6 { animation-delay: 0.3s; }

.anim-left-d1 { animation-delay: 0.05s; } .anim-left-d2 { animation-delay: 0.1s; }
.anim-left-d3 { animation-delay: 0.15s; }
.anim-up-d1 { animation-delay: 0.05s; }   .anim-up-d2 { animation-delay: 0.1s; }
.anim-up-d3 { animation-delay: 0.15s; }   .anim-up-d4 { animation-delay: 0.2s; }
.anim-up-d5 { animation-delay: 0.25s; }   .anim-up-d6 { animation-delay: 0.3s; }
.anim-down-d1 { animation-delay: 0.05s; } .anim-down-d2 { animation-delay: 0.1s; }
.anim-down-d3 { animation-delay: 0.15s; }
.anim-fade-d1 { animation-delay: 0.05s; } .anim-fade-d2 { animation-delay: 0.1s; }
.anim-fade-d3 { animation-delay: 0.15s; } .anim-fade-d4 { animation-delay: 0.2s; }
.anim-fade-d5 { animation-delay: 0.25s; } .anim-fade-d6 { animation-delay: 0.3s; }

/* After animation completes — clean state for hover */
.anim-done {
    animation: none;
    opacity: 1;
    transform: none;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    margin-top: max(10px, var(--safe-top));
    margin-bottom: 8px;
    flex-shrink: 0;
    background: rgba(20, 25, 45, 0.25);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: var(--transition);
    cursor: default;
}
.header:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: rgba(25, 32, 58, 0.35);
    box-shadow: var(--card-shadow-hover);
}
.user-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
.avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.6), rgba(154, 143, 223, 0.4));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: white; font-weight: 700;
    flex-shrink: 0; border: 1px solid rgba(122, 111, 191, 0.3); overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
}
.header:hover .avatar {
    transform: scale(1.1);
    box-shadow: 0 4px 14px rgba(122, 111, 191, 0.3);
}
.avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }
.user-details { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.user-name { font-weight: 700; font-size: 14px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-id { font-size: 11px; color: var(--text-secondary); }
.balance {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; background: rgba(30, 35, 55, 0.3);
    border-radius: 28px; font-weight: 600; font-size: 13px;
    border: 1px solid rgba(70, 80, 110, 0.2);
    color: var(--text-primary); flex-shrink: 0; cursor: pointer;
    transition: var(--transition);
}
.balance:hover { background: rgba(40, 50, 75, 0.4); }
.balance i { font-size: 14px; color: var(--accent-bright); }

/* ═══════════════════════════════════════
   CONTENT AREA
═══════════════════════════════════════ */
.content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 2px 0 8px;
    scrollbar-width: none; -ms-overflow-style: none;
    -webkit-overflow-scrolling: touch;
}
.content::-webkit-scrollbar { display: none; }

.section-title {
    font-family: var(--font-display);
    font-size: 21px; font-weight: 700;
    margin: 6px 0 12px; padding-bottom: 6px;
    color: var(--text-primary); letter-spacing: -0.5px;
    position: relative; display: block;
}
.section-title::after {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 40px; height: 2px;
    background: linear-gradient(90deg, var(--accent-bright), rgba(154, 143, 223, 0.3), var(--accent-bright));
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
    border-radius: 2px;
}
.section-subtitle {
    font-size: 12px; font-weight: 600;
    margin: 14px 0 10px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.8px;
    display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════
   GLASS EFFECT
═══════════════════════════════════════ */
.glass {
    /* Референс: glass-bg = rgba(15,15,30,0.3) + blur(12px) + border rgba(80,90,120,0.25) */
    /* Адаптировано: увеличена непрозрачность для нашего более светлого фона */
    background: rgba(12, 15, 35, 0.55);
    backdrop-filter: blur(20px) saturate(200%);
    -webkit-backdrop-filter: blur(20px) saturate(200%);
    border: 1px solid rgba(90, 105, 150, 0.4);
    border-radius: 20px;
    transition: var(--transition);
    box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.35),
        0 1px 0 rgba(255, 255, 255, 0.05) inset;
}
.glass:hover {
    border-color: rgba(122, 111, 191, 0.55);
    background: rgba(16, 20, 48, 0.65);
    box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(122, 111, 191, 0.12),
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
    transform: translateY(-1px);
}

/* ═══════════════════════════════════════
   HOVERABLE CARD — unified hover behavior
═══════════════════════════════════════ */
.hoverable {
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-color 0.28s ease,
                box-shadow 0.28s ease,
                background 0.28s ease;
    cursor: default;
}
.hoverable:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    box-shadow: var(--card-shadow-hover);
}

/* Disable hover on touch devices to prevent sticky states */
@media (hover: none) {
    .hoverable:hover,
    .header:hover,
    .glass:hover,
    [class*="card"]:hover,
    [class*="btn"]:hover,
    .ref-link:hover,
    .promo-section:hover,
    .faq:hover,
    .modal-content:hover,
    .topup-method:hover,
    .copy-btn:hover,
    .promo-btn:hover,
    .modal-close:hover,
    .country-flag:hover {
        transform: none !important;
        box-shadow: none !important;
    }
    /* На тач — убираем hover у nav полностью */
    .nav-item:hover {
        background: none !important;
        border-color: transparent !important;
        box-shadow: none !important;
        color: var(--text-secondary) !important;
    }
    /* Исключение: active остаётся видимым */
    .nav-item.active,
    .nav-item.active:hover {
        color: var(--accent-bright) !important;
        background: rgba(122, 111, 191, 0.18) !important;
        border-color: rgba(122, 111, 191, 0.4) !important;
        box-shadow: 0 0 14px rgba(122, 111, 191, 0.12) !important;
    }

}

/* ═══════════════════════════════════════
   SUBSCRIPTION CARD
═══════════════════════════════════════ */
.subscription-card {
    padding: 16px; margin-bottom: 12px;
    position: relative; overflow: hidden;
    background: rgba(15, 18, 40, 0.55);
    border: 1px solid rgba(80, 90, 130, 0.25);
    border-radius: 20px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
}
.subscription-card::before {
    content: ''; position: absolute;
    top: -20%; right: -20%;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(122, 111, 191, 0.1) 0%, transparent 70%);
    border-radius: 50%; filter: blur(30px);
    pointer-events: none; opacity: 0.6;
}
.subscription-card:hover {
    background: rgba(20, 25, 50, 0.65);
}
.subscription-card .title {
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    margin-bottom: 12px; color: var(--accent-bright);
    display: flex; align-items: center; gap: 8px;
}
.subscription-card .title i { font-size: 18px; }
.subscription-card .detail {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; margin-bottom: 6px;
    color: var(--text-secondary);
    padding: 4px 0 4px 0; border-bottom: 1px solid rgba(70, 80, 110, 0.1);
    transition: padding-left 0.22s ease, color 0.22s ease;
    cursor: default;
}
.subscription-card .detail:last-of-type { border-bottom: none; }
.subscription-card .detail:hover {
    padding-left: 5px;
    color: var(--accent-bright);
}
.subscription-card .detail i { width: 16px; color: var(--accent-bright); font-size: 12px; flex-shrink: 0; }
.subscription-card .detail .value { color: var(--text-primary); font-weight: 600; margin-left: auto; }

/* ═══════════════════════════════════════
   CONNECT HELP CARD
═══════════════════════════════════════ */
.connect-help-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: rgba(20, 25, 45, 0.3);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    cursor: pointer;
    transition: var(--transition);
}
.connect-help-card:hover {
    border-color: rgba(122, 111, 191, 0.3);
    transform: translateY(-1px);
    background: rgba(25, 32, 58, 0.4);
}
.connect-help-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent-glow);
    border: 1px solid rgba(122, 111, 191, 0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.connect-help-icon i { font-size: 15px; color: var(--accent-bright); }
.connect-help-text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.connect-help-text .label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.connect-help-text .desc  { font-size: 11px; color: var(--text-tertiary); }

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
    border: none; border-radius: 18px; padding: 10px 18px;
    font-weight: 600; font-size: 13px;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: var(--transition);
    font-family: var(--font-body); white-space: nowrap;
    min-height: 44px; -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn.primary {
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.7), rgba(154, 143, 223, 0.5));
    color: white; border: 1px solid rgba(122, 111, 191, 0.3);
    backdrop-filter: blur(8px); box-shadow: 0 4px 12px rgba(122, 111, 191, 0.15);
}
.btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(122, 111, 191, 0.2); }
.btn.secondary {
    background: rgba(30, 35, 55, 0.3); border: 1px solid rgba(70, 80, 110, 0.2);
    color: var(--text-secondary); backdrop-filter: blur(8px);
}
.btn.secondary:hover { background: rgba(40, 50, 75, 0.4); color: var(--accent-bright); }
.btn.full-width { width: 100%; }
.btn.rounded { border-radius: 26px; }

.progress-bar { height: 4px; background: rgba(70, 80, 110, 0.15); border-radius: 2px; margin: 8px 0 6px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, rgba(122, 111, 191, 0.6), rgba(154, 143, 223, 0.4)); border-radius: 2px; transition: width 0.4s ease; }

/* ═══════════════════════════════════════
   ACTION ROW BUTTONS
═══════════════════════════════════════ */
.action-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.btn.action-row {
    display: flex; flex-direction: row; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 16px; text-align: left;
    justify-content: flex-start; width: 100%;
    background: var(--card-bg);
    border: 1px solid rgba(70, 80, 110, 0.2);
    box-shadow: none; color: var(--text-primary);
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
               border-color 0.28s ease,
               background 0.28s ease;
}
.btn.action-row:hover {
    background: var(--accent-glow);
    border-color: rgba(122, 111, 191, 0.25);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.action-icon-wrap {
    width: 42px; height: 42px; border-radius: 12px;
    background: rgba(70, 80, 110, 0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; color: var(--accent-bright);
    transition: var(--transition);
}
.btn.action-row:hover .action-icon-wrap { background: rgba(122, 111, 191, 0.15); transform: scale(1.08); }
.action-text-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.action-label { font-weight: 700; font-size: 14px; color: var(--text-primary); }
.action-desc { font-size: 11px; color: rgba(255, 255, 255, 0.5); }
.action-arrow { font-size: 11px; color: rgba(255, 255, 255, 0.35); flex-shrink: 0; }

/* ═══════════════════════════════════════
   NO SUBSCRIPTION STATE
═══════════════════════════════════════ */
.no-sub-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--accent-glow);
    border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
}
.no-sub-icon i { font-size: 24px; color: var(--accent-bright); }
.no-sub-text { color: var(--text-secondary); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }

/* ═══════════════════════════════════════
   TARIFF CARDS
═══════════════════════════════════════ */
.tariffs-list { display: flex; flex-direction: column; gap: 10px; }
.tariff-card {
    padding: 13px 14px; cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
               border-color 0.28s ease,
               box-shadow 0.28s ease,
               background 0.28s ease;
    position: relative; overflow: hidden;
    background: var(--card-bg);
    border: 1px solid rgba(70, 80, 110, 0.18);
    border-radius: 18px; backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex; flex-direction: column; gap: 9px;
}
.tariff-card:hover {
    background: rgba(30, 40, 65, 0.35);
    border-color: var(--card-border-hover);
    transform: translateY(-2px);
    box-shadow: var(--card-shadow-hover);
}
.tariff-card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.tariff-card-days { display: flex; align-items: baseline; gap: 4px; }
.tariff-days-num { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1; }
.tariff-days-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.tariff-card-price {
    display: flex; align-items: baseline; gap: 2px;
    background: var(--accent-glow); border: 1px solid var(--accent-border);
    border-radius: 10px; padding: 4px 12px; flex-shrink: 0;
}
.tariff-price-num { font-family: var(--font-display); font-size: 17px; font-weight: 800; color: var(--accent-bright); line-height: 1; }
.tariff-price-cur { font-size: 12px; color: var(--accent); font-weight: 600; }
.tariff-card-features { display: flex; gap: 6px; flex-wrap: wrap; }
.tariff-feature {
    display: flex; align-items: center; gap: 4px; font-size: 11px;
    color: var(--text-secondary); background: rgba(30, 35, 55, 0.4);
    border: 1px solid var(--card-border); border-radius: 7px; padding: 3px 8px; font-weight: 500;
}
.tariff-feature i { color: var(--accent-bright); font-size: 10px; width: 12px; text-align: center; }
.tariff-locations { border-top: 1px solid rgba(70, 80, 110, 0.12); padding-top: 8px; display: flex; flex-direction: column; gap: 5px; }
.tariff-locations-label {
    font-size: 10px; color: var(--text-tertiary); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    display: flex; align-items: center; gap: 5px;
}
.tariff-locations-label i { color: var(--accent); font-size: 10px; }
.tariff-countries { display: flex; flex-wrap: wrap; gap: 5px; }
.country-flag {
    font-size: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(30, 35, 55, 0.4);
    border: 1px solid var(--card-border);
    transition: all 0.22s;
    cursor: default; line-height: 1;
}
.country-flag:hover { background: rgba(122, 111, 191, 0.15); border-color: rgba(122, 111, 191, 0.3); transform: scale(1.12); }
.tariff-locations-note {
    font-size: 10px; color: var(--accent-bright);
    background: rgba(122, 111, 191, 0.08); border: 1px solid rgba(122, 111, 191, 0.15);
    border-radius: 7px; padding: 4px 8px;
    display: flex; align-items: center; gap: 5px; font-weight: 500;
}
.tariff-card-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px;
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.5), rgba(154, 143, 223, 0.3));
    border: 1px solid rgba(122, 111, 191, 0.3); border-radius: 11px;
    font-size: 13px; font-weight: 700; color: white; transition: all 0.2s;
}
.tariff-card:hover .tariff-card-btn {
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.7), rgba(154, 143, 223, 0.5));
}

/* ═══════════════════════════════════════
   STATS GRID (Referral)
═══════════════════════════════════════ */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-card {
    padding: 12px 8px; text-align: center; border-radius: 16px;
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: default;
}
.stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: rgba(25, 32, 58, 0.35);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.stat-icon { font-size: 20px; color: var(--accent-bright); }
.stat-label { font-size: 9px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-value { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--accent-bright); }

/* REF LINK */
.ref-link {
    padding: 14px; margin-bottom: 14px;
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    border-radius: 18px; backdrop-filter: blur(8px);
    cursor: default;
}
.ref-link:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.ref-link p { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 600; }
.ref-link-input {
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(70, 80, 110, 0.15);
    border-radius: 12px; padding: 10px 14px;
    color: var(--text-primary); font-size: 11px;
}
.copy-btn {
    width: 44px; height: 44px; border-radius: 28px;
    background: rgba(122, 111, 191, 0.5); border: 1px solid rgba(122, 111, 191, 0.3);
    color: white; font-size: 14px; cursor: pointer; transition: var(--transition);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.copy-btn:hover { transform: scale(1.05); background: rgba(122, 111, 191, 0.6); }

/* INFO HINT BLOCK (reusable) */
.info-hint {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 14px;
    background: rgba(122, 111, 191, 0.06);
    border: 1px solid rgba(122, 111, 191, 0.12);
    border-radius: 14px; margin-bottom: 14px;
}
.info-hint i { color: var(--accent-bright); font-size: 13px; margin-top: 1px; flex-shrink: 0; }
.info-hint span { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.info-hint.info-lg span { font-size: 12px; }

/* ═══════════════════════════════════════
   TOPUP METHODS
═══════════════════════════════════════ */
.topup-method {
    padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    border-radius: 16px; background: rgba(20, 25, 45, 0.2);
    border: 1px solid var(--card-border);
    transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer; position: relative; overflow: hidden;
    backdrop-filter: blur(8px); min-height: 48px; margin-bottom: 8px;
}
.topup-method::after {
    content: ''; position: absolute; left: 0; top: 0;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, rgba(122, 111, 191, 0.7), transparent);
    transform: scaleY(0); transform-origin: top;
    transition: transform 0.3s ease-out;
}
.topup-method:hover {
    border-color: rgba(122, 111, 191, 0.3);
    background: rgba(30, 40, 60, 0.35);
    transform: translateX(3px);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.topup-method:hover::after { transform: scaleY(1); }
.topup-method:active { transform: scale(0.97); }
.topup-method i:first-child { font-size: 20px; color: var(--accent-bright); width: 24px; flex-shrink: 0; }
.topup-method-text { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.topup-method-name { font-weight: 700; color: var(--text-primary); font-size: 14px; }
.topup-method-desc { font-size: 11px; color: var(--text-secondary); font-weight: 400; line-height: 1.4; }
.topup-method-arrow { font-size: 12px; color: var(--text-tertiary); flex-shrink: 0; }
/* Override specificity: these must beat .topup-method span */
.topup-method .topup-method-name { font-weight: 700; font-size: 14px; color: var(--text-primary); }
.topup-method .topup-method-desc { font-size: 11px; font-weight: 400; color: var(--text-secondary); }

/* ═══════════════════════════════════════
   REFERRAL HERO CARD
═══════════════════════════════════════ */
/* referral-hero: inline styles (matched to reference) */

/* PROMO */
.promo-section {
    background: rgba(122, 111, 191, 0.08); border: 1px solid rgba(122, 111, 191, 0.18);
    border-radius: 18px; padding: 14px; margin-bottom: 14px;
    transition: var(--transition-fast);
    cursor: default;
}
.promo-section:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: var(--accent-glow);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
}
.promo-section p { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 600; }
.promo-section p i { color: var(--accent-bright); }
.promo-row { display: flex; gap: 8px; }
.promo-input {
    flex: 1; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(70, 80, 110, 0.2);
    border-radius: 12px; padding: 11px 14px; color: var(--text-primary);
    font-size: 13px; outline: none; font-family: var(--font-body); transition: border-color 0.2s;
}
.promo-input::placeholder { color: var(--text-tertiary); }
.promo-input:focus { border-color: var(--glass-border-hover); }
.promo-btn {
    padding: 11px 16px;
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.7), rgba(154, 143, 223, 0.5));
    border: none; border-radius: 12px; color: white; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; font-family: var(--font-body); transition: var(--transition);
}
.promo-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(122, 111, 191, 0.2); }

/* ═══════════════════════════════════════
   SUPPORT
═══════════════════════════════════════ */
.support-card {
    padding: 20px 16px; text-align: center; margin-bottom: 16px;
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    border-radius: 18px; backdrop-filter: blur(8px);
    cursor: default;
}
.support-card:hover {
    transform: translateY(-2px);
    border-color: var(--card-border-hover);
    background: rgba(25, 32, 58, 0.3);
    box-shadow: var(--card-shadow-hover);
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}
.support-icon {
    font-size: 40px; color: var(--accent-bright); margin-bottom: 10px; display: block;
    animation: float 2.8s ease-in-out infinite;
}
.support-card p { color: var(--text-secondary); margin-bottom: 12px; font-size: 13px; }

/* FAQ */
.faq {
    background: rgba(20, 25, 45, 0.2); border: 1px solid var(--card-border);
    border-radius: 18px; backdrop-filter: blur(8px); overflow: hidden;
    cursor: default;
}
.faq:hover {
    /* No transform — overflow:hidden clips children at pre-transform bounds */
    border-color: rgba(122, 111, 191, 0.3);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
}
.faq-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid rgba(70, 80, 110, 0.12); font-weight: 700; font-size: 13px; color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase; }
.faq-header i { color: var(--accent-bright); font-size: 14px; }
.faq-list { padding: 6px 0; }
.faq-item { border-bottom: 1px solid rgba(70, 80, 110, 0.08); }
.faq-item:last-child { border-bottom: none; }
.faq-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; cursor: pointer; list-style: none;
    transition: background 0.2s; min-height: 44px;
    -webkit-tap-highlight-color: transparent; user-select: none;
}
.faq-row:hover { background: rgba(122, 111, 191, 0.06); }
/* Legacy: keep summary styles for any remaining <details> */
.faq-item summary { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; list-style: none; transition: background 0.2s; min-height: 44px; }
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item summary:hover { background: rgba(122, 111, 191, 0.06); }
/* Accordion body */
.faq-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease;
    will-change: max-height;
    padding: 0 16px;
}
.faq-body p { font-size: 12px; line-height: 1.65; color: var(--text-secondary); padding: 12px 0 14px; border-top: 1px solid rgba(70,80,110,0.1); margin: 0; }
.faq-body p strong { color: var(--text-primary); font-weight: 600; }
/* Open state */
.faq-item.open .faq-icon-wrap { background: rgba(122, 111, 191, 0.22); }
.faq-item.open .faq-chevron { transform: rotate(180deg); color: var(--accent-bright); }
.faq-icon-wrap { width: 34px; height: 34px; border-radius: 10px; background: var(--accent-glow); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--accent-bright); flex-shrink: 0; transition: background 0.2s; }
.faq-question { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }
.faq-chevron { font-size: 11px; color: var(--text-tertiary); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); flex-shrink: 0; }

/* ═══════════════════════════════════════
   SKELETON LOADER
═══════════════════════════════════════ */
.skeleton {
    background: linear-gradient(90deg, rgba(20, 25, 45, 0.2) 25%, rgba(122, 111, 191, 0.08) 50%, rgba(20, 25, 45, 0.2) 75%);
    background-size: 200% 100%; animation: loading 1.2s infinite;
    border-radius: 16px; height: 60px; margin-bottom: 10px;
}
@keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
.toast {
    position: fixed;
    bottom: max(80px, calc(var(--safe-bottom) + 80px));
    left: 50%; transform: translateX(-50%) translateY(160px);
    background: rgba(20, 25, 45, 0.95); border: 1px solid rgba(70, 80, 110, 0.2);
    border-radius: 32px; padding: 10px 16px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 500; font-size: 13px; color: var(--accent-bright);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
    z-index: 9999; white-space: nowrap; max-width: 85vw;
    pointer-events: none; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ═══════════════════════════════════════
   MODAL — bottom sheet style
═══════════════════════════════════════ */
.modal { display: none; position: fixed; inset: 0; z-index: 1500; justify-content: center; align-items: flex-end; padding: 0; }
.modal.show { display: flex; }
.modal-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px); }
.modal-content {
    max-width: 100%; width: 100%; padding: 0;
    border-radius: 24px 24px 0 0; position: relative; z-index: 1;
    background: rgba(14, 18, 38, 0.97); border: 1px solid rgba(80, 90, 130, 0.25);
    border-bottom: none; backdrop-filter: blur(20px);
    box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5);
    max-height: 92vh; overflow-y: auto;
    animation: modalSlideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
}
.modal-content:hover {
    transform: translateY(-2px);
    box-shadow: 0 -12px 50px rgba(0, 0, 0, 0.6);
}
.modal-drag { display: flex; justify-content: center; padding: 14px 0 6px; }
.modal-drag-bar { width: 40px; height: 4px; background: rgba(120, 130, 160, 0.35); border-radius: 2px; }
.modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px 14px 20px;
    border-bottom: 1px solid rgba(70, 80, 110, 0.15);
}
.modal-header h3 {
    font-family: var(--font-display); font-size: 17px;
    color: var(--text-primary); font-weight: 700; margin: 0;
}
#modal-body { padding: 20px 20px 0 20px; }
#modal-buttons.modal-buttons { padding: 0 20px max(24px, calc(var(--safe-bottom) + 16px)) 20px; }
.modal-close {
    background: rgba(30, 35, 55, 0.5); border: 1px solid rgba(70, 80, 110, 0.2);
    border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.modal-close:hover { background: rgba(122, 111, 191, 0.25); color: var(--accent-bright); }

/* Modal tariff name */
.modal-tariff-name {
    font-family: var(--font-body);
    font-size: 22px; font-weight: 300;
    color: var(--accent-bright);
    text-align: center;
    letter-spacing: 0.5px;
    padding: 0 0 16px;
}
/* Modal detail rows */
.modal-detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 1px solid rgba(70, 80, 110, 0.1); font-size: 13px;
}
.modal-detail-row:last-of-type { border-bottom: none; }
.modal-detail-label { color: var(--text-secondary); }
.modal-detail-value { color: var(--text-primary); font-weight: 600; }
.modal-detail-value.accent { color: var(--accent-bright); font-size: 17px; font-weight: 700; }

/* Modal balance warning */
.modal-balance-warn {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    background: rgba(255, 80, 80, 0.07);
    border: 1px solid rgba(255, 80, 80, 0.18);
    border-radius: 12px;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    margin-top: 12px;
}
.modal-balance-warn i { font-size: 15px; color: var(--danger); flex-shrink: 0; }
.modal-balance-warn .warn-balance { color: var(--text-primary); font-weight: 600; }
.modal-balance-warn .warn-short { color: var(--danger); font-weight: 700; }

/* Modal buttons */
.modal-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.modal-btn {
    border-radius: 14px; padding: 12px 16px; font-size: 14px; font-weight: 600;
    color: var(--text-primary); cursor: pointer; transition: all 0.25s;
    width: 100%; font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 46px;
    background: rgba(25, 30, 52, 0.8);
    border: 1px solid rgba(70, 80, 110, 0.2);
    text-align: center;
}
.modal-btn:hover {
    background: rgba(122, 111, 191, 0.2); border-color: rgba(122, 111, 191, 0.3);
    color: var(--accent-bright); transform: translateY(-1px);
}
/* Primary modal button — payment CTA */
.modal-btn-primary {
    height: 50px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    padding: 0 20px;
    width: calc(100% - 32px);
    margin: 0 16px 16px 16px;
    letter-spacing: 0.3px;
    box-shadow: 0 1px 4px rgba(122, 111, 191, 0.2);
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.55), rgba(154, 143, 223, 0.45));
    border: 1px solid rgba(122, 111, 191, 0.22);
    color: white;
    cursor: pointer;
    font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}
.modal-btn-primary:hover {
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.7), rgba(154, 143, 223, 0.6));
    box-shadow: 0 0 20px rgba(122, 111, 191, 0.5), 0 0 8px rgba(122, 111, 191, 0.3);
    border-color: var(--glass-border-hover);
    transform: translateY(-1px);
}

@keyframes modalSlideUp { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

/* ═══════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════ */
.bottom-nav {
    display: flex; justify-content: space-around;
    padding: 6px 4px; padding-bottom: max(6px, calc(var(--safe-bottom) + 6px));
    margin: 6px 0 max(10px, var(--safe-bottom));
    border-radius: 20px; gap: 4px;
    background: rgba(20, 25, 45, 0.25); border: 1px solid var(--card-border);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); flex-shrink: 0;
}
.nav-item {
    background: none; border: 1px solid transparent; color: var(--text-secondary);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; font-weight: 600; padding: 8px 6px; border-radius: 16px;
    cursor: pointer; position: relative; flex: 1; min-height: 44px; min-width: 44px;
    justify-content: center; font-family: var(--font-body);
    transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease,
                transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
}
.nav-item i { font-size: 18px; }
/* Hover — только десктоп, на тач @media (hover:none) сбросит */
.nav-item:hover {
    color: var(--accent-bright);
    background: rgba(122, 111, 191, 0.1);
    border-color: rgba(122, 111, 191, 0.45);
    box-shadow: 0 0 10px rgba(122, 111, 191, 0.15),
                inset 0 0 8px rgba(122, 111, 191, 0.05);
}
/* Active: управляется JS transform — CSS :active ненадёжен в Telegram WebView */
.nav-item.active {
    color: var(--accent-bright);
    background: rgba(122, 111, 191, 0.18);
    border-color: rgba(122, 111, 191, 0.4);

<script>
'use strict';

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
const SKELETON_DELAY_MS   = 250;
const ANIM_CLEANUP_MS     = 950;  // max-delay(0.3s) + duration(0.6s) + buffer

/* ═══════════════════════════════════════

/* ═══════════════════════════════════════
   HAPTIC FEEDBACK MODULE
═══════════════════════════════════════ */
const HapticFeedback = {
    /** Вибрация при клике на кнопку (лёгкая) */
    buttonLight() {
        tg?.HapticFeedback?.impactOccurred?.('light');
    },
    /** Вибрация при важном действии (средняя) */
    buttonMedium() {
        tg?.HapticFeedback?.impactOccurred?.('medium');
    },
    /** Вибрация при навигации */
    navigation() {
        tg?.HapticFeedback?.impactOccurred?.('light');
    },
    /** Вибрация при успехе */
    success() {
        tg?.HapticFeedback?.notificationOccurred?.('success');
    },
    /** Вибрация при ошибке */
    error() {
        tg?.HapticFeedback?.notificationOccurred?.('error');
    },
    /** Вибрация при предупреждении */

/* ═══════════════════════════════════════
   DOUBLE-CLICK PREVENTION (with TTL cleanup)
═══════════════════════════════════════ */
const clickTimestamps = new Map();
const CLICK_TTL_MS = 10000; // Очистка записей старше 10 секунд

function canProceed(actionId) {
    const now = Date.now();
    const lastClick = clickTimestamps.get(actionId) || 0;
    if (now - lastClick < DOUBLE_CLICK_PREVENT_MS) {
        return false;
    }
    clickTimestamps.set(actionId, now);

    // TTL cleanup — удаляем старые записи
    for (const [key, ts] of clickTimestamps) {
        if (now - ts > CLICK_TTL_MS) clickTimestamps.delete(key);
    }
    return true;
}

/* ═══════════════════════════════════════
   PROMO CODES (test stubs)
   ⚠️  SECURITY: Перенести на backend перед продакшеном!
   Клиентская валидация промокодов позволяет пользователям

═══════════════════════════════════════ */

    ],

/* ═══════════════════════════════════════
   DOM CACHE
═══════════════════════════════════════ */
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => ctx.querySelectorAll(sel);

const contentEl    = $('#content');
const toast        = $('#custom-toast');
const toastMsg     = $('#toast-message');
const toastIcon    = $('#toast-icon');

const modalBody    = $('#modal-body');
const modalButtons = $('#modal-buttons');

let currentTab = 'home';

/* ═══════════════════════════════════════
   XSS PROTECTION — escape user data before innerHTML
═══════════════════════════════════════ */
function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
}

/* ═══════════════════════════════════════
   ANIMATION CLEANUP
═══════════════════════════════════════ */
let cleanupTimer = null;
function registerAnimCleanup() {
    if (cleanupTimer) clearTimeout(cleanupTimer);
    cleanupTimer = setTimeout(() => {
        $$(ANIM_SELECTORS).forEach(el => el.classList.add('anim-done'));
        cleanupTimer = null;
    }, ANIM_CLEANUP_MS);
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer = null;
const TOAST_TYPES = {
    success: { icon: 'fa-check-circle',        border: 'rgba(122,111,191,0.4)', color: 'var(--accent-bright)' },
    error:   { icon: 'fa-exclamation-circle',   border: 'rgba(255,107,107,0.5)', color: '#ff6b6b' },
    warning: { icon: 'fa-exclamation-triangle', border: 'rgba(255,165,2,0.5)',   color: '#ffa502' },
};

function showToast(msg, type = 'success') {
    const cfg = TOAST_TYPES[type] || TOAST_TYPES.success;
    toastMsg.textContent = msg;
    toastIcon.className = `fas ${cfg.icon}`;
    toast.style.borderColor = cfg.border;
    toast.style.color = cfg.color;

    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
    toast.classList.add('show');
    toastTimer = setTimeout(() => { toast.classList.remove('show'); toastTimer = null; }, TOAST_DURATION_MS);
}

/* ═══════════════════════════════════════
   CLIPBOARD HELPER (with fallback)
═══════════════════════════════════════ */
async function copyToClipboard(text) {
    try {
        if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
        } else {
            // Fallback for older WebViews
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;left:-9999px;';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        return true;
    } catch {
        return false;
    }
}

/* ═══════════════════════════════════════
   MODAL (with drag-to-dismiss + ARIA + close confirmation)
═══════════════════════════════════════ */
let modalHasInput = false; // Track if modal has unsaved input
let modalDragStartY = 0;
let modalDragCurrentY = 0;
let modalIsDragging = false;

function hideModal() {
    if (modalHasInput) {
        // Show confirmation before closing if there's unsaved input
        if (!confirm('Закрыть? Введённые данные будут потеряны.')) return;
    }
    HapticFeedback.buttonLight();
    modal.classList.remove('show');
    modalHasInput = false;
}

// ARIA: make modal accessible
modal?.setAttribute('role', 'dialog');
modal?.setAttribute('aria-modal', 'true');
modal?.setAttribute('aria-labelledby', 'modal-title');

// Drag-to-dismiss for modal
const modalContent = $('.modal-content');
const modalDragBar = $('.modal-drag-bar');

function onModalDragStart(e) {
    const touch = e.touches?.[0] || e;
    modalDragStartY = touch.clientY;
    modalIsDragging = true;
    modalContent.style.transition = 'none';
}

function onModalDragMove(e) {
    if (!modalIsDragging) return;
    const touch = e.touches?.[0] || e;
    modalDragCurrentY = touch.clientY - modalDragStartY;
    if (modalDragCurrentY > 0) {
        modalContent.style.transform = `translateY(${modalDragCurrentY}px)`;
    }
}

function onModalDragEnd() {
    if (!modalIsDragging) return;
    modalIsDragging = false;
    modalContent.style.transition = '';
    if (modalDragCurrentY > 100) {
        // Use hideModal() to respect unsaved-input confirmation
        const hadInput = modalHasInput;
        if (hadInput && !confirm('Закрыть? Введённые данные будут потеряны.')) {
            // User cancelled — snap back
            modalContent.style.transform = '';
            modalDragCurrentY = 0;
            return;
        }
        // Dismiss modal with animation
        modalContent.style.transform = 'translateY(100%)';
        setTimeout(() => {
            modal.classList.remove('show');
            modalContent.style.transform = '';
            modalHasInput = false;
        }, 200);
    } else {
        // Snap back
        modalContent.style.transform = '';
    }
    modalDragCurrentY = 0;
}

modalDragBar?.addEventListener('mousedown', onModalDragStart);
modalDragBar?.addEventListener('touchstart', onModalDragStart, { passive: true });
document.addEventListener('mousemove', onModalDragMove);
document.addEventListener('touchmove', onModalDragMove, { passive: true });
document.addEventListener('mouseup', onModalDragEnd);
document.addEventListener('touchend', onModalDragEnd);

modalClose?.addEventListener('click', hideModal);
modal?.addEventListener('click', e => {
    if (e.target.classList.contains('modal-overlay')) hideModal();
});

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
function updateHeader() {
    const u = AppData.user;
    $('#userName').textContent = String(u.name);
    $('#userId').textContent = `ID: ${String(u.id)}`;
    $('#userBalance').textContent = `${Number(u.balance).toFixed(2)}₽`;
}
updateHeader();

/* Header balance click with haptic */
$('#balanceDisplay')?.addEventListener('click', () => {
    HapticFeedback.buttonLight();
    switchTab('topup');
});

/* ═══════════════════════════════════════
   NAVIGATION — event delegation
═══════════════════════════════════════ */
function switchTab(tab) {
    $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    currentTab = tab;
    showTab(tab);
    // BackButton: show on all tabs except home
    if (isTelegram && tg.BackButton) {
        if (tab === 'home') tg.BackButton.hide();
        else tg.BackButton.show();
    }
}

/* ── Nav: touchend+preventDefault (Telegram WebApp proven pattern) ──
   touchend с preventDefault: мгновенный отклик + блокировка ghost-click на iOS
   click: fallback для десктопа и устройств без touch */
function _navHandleTap(btn) {
    if (!btn || !btn.dataset.tab) return;
    HapticFeedback.navigation();
    // Scale сразу — GPU-слой уже выделен через will-change
    btn.style.transform = 'scale(0.90)';
    setTimeout(() => { btn.style.transform = ''; }, 150);
    // switchTab через rAF: браузер коммитит кадр с nav-анимацией
    // ДО того как начнётся тяжёлая DOM-работа content-перехода
    requestAnimationFrame(() => {
        switchTab(btn.dataset.tab);
    });
}

$$('.nav-item').forEach(btn => {
    let _touchHandled = false;

    btn.addEventListener('touchend', function(e) {
        e.preventDefault(); // блокирует ghost-click (300ms задержку) на iOS/Android
        _touchHandled = true;
        _navHandleTap(this);
        setTimeout(() => { _touchHandled = false; }, 500);
    }, { passive: false }); // passive:false обязателен для e.preventDefault()

    btn.addEventListener('click', function() {
        if (_touchHandled) return; // touchend уже обработал
        _navHandleTap(this);
    });
});

/* ═══════════════════════════════════════
   TAB ROUTER
═══════════════════════════════════════ */
const TAB_RENDERERS = {
    home:     renderHome,
    tariffs:  renderTariffs,
    referral: renderReferral,
    topup:    renderTopUp,
    support:  renderSupport,
};

let tabTimer = null;
function showTab(tab) {
    if (tabTimer) { clearTimeout(tabTimer); tabTimer = null; }

    // Рендерим сразу (без fade-out конкурирующего с nav-анимацией)
    if (tabTimer) { clearTimeout(tabTimer); tabTimer = null; }
    contentEl.style.opacity = '0';
    contentEl.style.transform = 'translateY(10px)';
    contentEl.style.transition = 'none';
    contentEl.innerHTML = '';

    tabTimer = setTimeout(() => {
        tabTimer = null;
        const renderer = TAB_RENDERERS[tab];
        if (renderer) {
            try { renderer(); }
            catch (err) {
                console.error(`[NVX] Ошибка рендера вкладки "${tab}":`, err);
                contentEl.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки. Попробуйте ещё раз.</div>`;
            }
        }
        // Плавный fade-in нового контента
        requestAnimationFrame(() => {
            contentEl.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
            contentEl.style.opacity = '1';
            contentEl.style.transform = 'translateY(0)';
            setTimeout(() => { contentEl.style.transition = ''; }, 250);
        });
    }, SKELETON_DELAY_MS);
}

/* ═══════════════════════════════════════
   CONTENT — event delegation on #content
═══════════════════════════════════════ */
contentEl.addEventListener('click', e => {
    const target = e.target;

    // Action row buttons (renew, devices)
    const actionBtn = target.closest('.btn.action-row[data-action]');
    if (actionBtn && canProceed('action-' + actionBtn.dataset.action)) {
        HapticFeedback.buttonMedium();
        showToast('Доступно после подключения backend', 'warning');
        return;
    }

    // Connect help card
    if (target.closest('#connectHelpCard') && canProceed('connectHelp')) {
        HapticFeedback.buttonLight();
        showToast('Функция подключится после настройки backend');
        return;
    }

    // Tariff card click
    const tariffCard = target.closest('.tariff-card[data-id]');
    if (tariffCard && canProceed('tariff-' + tariffCard.dataset.id)) {
        HapticFeedback.buttonMedium();
        openTariffModal(parseInt(tariffCard.dataset.id, 10));
        return;
    }

    // Topup method
    const topupMethod = target.closest('.topup-method[data-method]');
    if (topupMethod && canProceed('topup-' + topupMethod.dataset.method)) {
        HapticFeedback.buttonMedium();
        const name = PAYMENT_METHODS[topupMethod.dataset.method];
        showToast(`Переход к оплате через ${name}`);
        return;
    }

    // Copy referral link
    if (target.closest('#copyRef') && canProceed('copyRef')) {
        HapticFeedback.buttonLight();
        copyToClipboard(AppData.referral.link).then(ok => {
            showToast(ok ? 'Ссылка скопирована' : 'Не удалось скопировать', ok ? 'success' : 'error');
        });
        return;
    }

    // Promo button
    if (target.closest('#promoBtn') && canProceed('promo')) {
        HapticFeedback.buttonMedium();
        const input = $('#promoInput');
        if (!input?.value.trim()) { showToast('Введите промокод', 'warning'); return; }
        const code = input.value.trim().toUpperCase();
        const promo = VALID_PROMOS[code];
        if (promo) {
            AppData.user.balance += promo.bonus;
            updateHeader();
            showToast(`Промокод активирован: ${promo.desc}`, 'success');
            HapticFeedback.success();
            input.value = '';
        } else {
            showToast('Промокод не найден', 'error');
            HapticFeedback.error();
        }
        return;
    }

    // Buy subscription
    if (target.closest('#buySubBtn') && canProceed('buySub')) {
        HapticFeedback.buttonMedium();
        switchTab('tariffs');
        return;
    }

    // Trial activation
    if (target.closest('#trialBtn') && canProceed('trial')) {
        HapticFeedback.buttonMedium();
        AppData.subscription.trialAvailable = false;
        AppData.subscription.active = true;
        showToast('Тестовая подписка активирована', 'success');
        renderHome();
        return;
    }

    // Withdraw buttons
    if ((target.closest('#withdrawCard') || target.closest('#withdrawBalance')) && canProceed('withdraw')) {
        HapticFeedback.buttonMedium();
        showToast('Доступно после подключения backend', 'warning');
        return;
    }

    // Support chat
    if (target.closest('#supportChatBtn') && canProceed('support')) {
        HapticFeedback.buttonMedium();
        showToast('Открываем чат поддержки');
        return;
    }
});

function openTariffModal(tariffId) {
    if (!Number.isFinite(tariffId)) return;
    const t = AppData.tariffs.find(x => x.id === tariffId);
    if (!t) { showToast('Тариф не найден', 'error'); return; }

    const n = AppData.nodesCount;
    const bal = AppData.user.balance;
    const diff = Math.ceil(t.price - bal);
    const notEnough = bal < t.price;

    modalTitle.textContent = 'Подтверждение покупки';
    modalBody.innerHTML = `
        <div class="modal-tariff-name">${t.days} дней доступа</div>
        <div style="background:rgba(0,0,0,0.15);border:1px solid rgba(70,80,110,0.12);border-radius:14px;padding:4px 14px;margin-bottom:4px;">
            <div class="modal-detail-row">
                <span class="modal-detail-label">Трафик</span>
                <span class="modal-detail-value">${t.traffic_gb * n} ГБ <span class="text-muted">(${t.traffic_gb} ГБ на лок.)</span></span>
            </div>
            <div class="modal-detail-row">
                <span class="modal-detail-label">Устройства</span>
                <span class="modal-detail-value">${t.ip_limit * n} <span class="text-muted">(${t.ip_limit} на лок.)</span></span>
            </div>
            <div class="modal-detail-row">
                <span class="modal-detail-label">Стоимость</span>
                <span class="modal-detail-value accent">${t.price}₽</span>
            </div>
        </div>
        ${notEnough ? `
        <div class="modal-balance-warn">
            <i class="fas fa-wallet"></i>
            <span>На балансе <span class="warn-balance">${bal.toFixed(2)}₽</span> — не хватает <span class="warn-short">${diff}₽</span></span>
        </div>` : ''}
    `;

    // CTA button
    modalButtons.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'modal-btn-primary';
    btn.innerHTML = notEnough
        ? `<i class="fas fa-credit-card"></i> Доплатить ${diff}₽`
        : `<i class="fas fa-check"></i> Оплатить ${t.price}₽`;

    btn.addEventListener('click', () => {
        HapticFeedback.buttonMedium();
        hideModal();
        if (notEnough) {
            showPayMethodModal({ shortage: diff, tariff: t });
        } else {
            showToast('Доступно после подключения backend', 'warning');
        }
    });
    modalButtons.appendChild(btn);
    modal.classList.add('show');
}

    const items = $$('.faq-item', contentEl);

    items.forEach(item => {
        const p = item.querySelector('.faq-body p');
        if (p) heightCache.set(item, p.scrollHeight + 28);
    });

    items.forEach(item => {
        const body = item.querySelector('.faq-body');
        item.querySelector('.faq-row').addEventListener('click', () => {
            const isOpen = item.classList.contains('open');

            items.forEach(o => {
                o.classList.remove('open');
                o.querySelector('.faq-body').style.maxHeight = '0';
            });
            // Open clicked if it was closed
            if (!isOpen) {
                item.classList.add('open');
                body.style.maxHeight = (heightCache.get(item) || 200) + 'px';
            }
        });
    });
}

                avatarImg.src = tgUser.photo_url;
                avatarImg.style.display = 'block';
            }
            if (avatarInitial) avatarInitial.style.display = 'none';
        }
    }

    // 2. Generate dynamic referral link
    AppData.referral.link = `https://t.me/NVXvpn_bot?start=ref${AppData.user.id}`;

    // 3. Update header with potentially new data
    updateHeader();

    // 4. Setup Telegram BackButton
    if (isTelegram && tg.BackButton) {
        tg.BackButton.onClick(() => {
            HapticFeedback.navigation();
            if (currentTab !== 'home') {
                switchTab('home');
                tg.BackButton.hide();
            }
        });
    }

    // 5. Handle Telegram keyboard (viewport changes)
    if (isTelegram) {
        tg.onEvent('viewportChanged', ({ isStateStable }) => {
            // Only adjust on stable viewport to avoid layout thrash
            if (!isStateStable) return;
            const content = $('.content');
            if (content) {
                if (tg.isExpanded) {
                    content.style.height = '';  // Reset to CSS flex
                } else {
                    content.style.height = `${tg.viewportStableHeight - 120}px`;
                }
            }
        });
    }

    // 6. Determine initial tab
    const _startParam = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('tab');
    const _validTabs = Object.keys(TAB_RENDERERS);
    const _initTab = (_startParam && _validTabs.includes(_startParam)) ? _startParam : 'home';

    if (_initTab !== 'home') {
        $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === _initTab));
        currentTab = _initTab;
        if (isTelegram && tg.BackButton) tg.BackButton.show();
    }

    showTab(_initTab);
}

/* ═══════════════════════════════════════
   LOADING OVERLAY
═══════════════════════════════════════ */
(function _injectLoadingStyles() {
    if (document.getElementById('loading-overlay-styles')) return;
    const s = document.createElement('style');
    s.id = 'loading-overlay-styles';
    s.textContent = `
        @keyframes loading-spin { to { transform: rotate(360deg); } }
        @keyframes loading-pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
        #loading-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(10, 14, 39, 0.75);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; pointer-events: all;
            opacity: 0; transition: opacity 0.25s ease;
            backdrop-filter: blur(4px);
        }
        #loading-overlay.visible { opacity: 1; }
        #loading-overlay .lo-spinner {
            width: 52px; height: 52px;
            border: 3px solid rgba(122,111,191,0.15);
            border-top-color: var(--accent-bright);
            border-radius: 50%;
            animation: loading-spin 0.8s linear infinite;
            will-change: transform;
        }
        #loading-overlay .lo-msg {
            color: #c8c2f0; font-size: 14px; font-weight: 500;
            letter-spacing: 0.3px; text-align: center;
            max-width: 220px; line-height: 1.5;
            animation: loading-pulse 2s ease-in-out infinite;
            font-family: var(--font-body);
        }
    `;
    document.head.appendChild(s);
})();

function showLoading(message = 'Загрузка...') {
    let overlay = document.getElementById('loading-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'loading-overlay';
        overlay.innerHTML = `<div class="lo-spinner"></div><span class="lo-msg">${escapeHtml(message)}</span>`;
        document.body.appendChild(overlay);
    } else {
        const msgEl = overlay.querySelector('.lo-msg');
        if (msgEl) msgEl.textContent = message;
        // Restart spinner animation
        const old = overlay.querySelector('.lo-spinner');
        if (old) old.replaceWith(old.cloneNode(true));
    }
    overlay.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('visible')));
}

function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) {
        overlay.classList.remove('visible');
        setTimeout(() => { overlay.style.display = 'none'; }, 250);
    }
}

// Splash: hide after app initialises
const _origInitApp = initApp;
initApp = function() {
    _origInitApp();
    setTimeout(() => {
        const splash = document.getElementById('nvx-splash');
        if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => { splash.style.display = 'none'; }, 500);
        }
    }, 1550); // bar animation (1.4s delay 0.15s) + tiny buffer
};

// Call init
initApp();
</script>
