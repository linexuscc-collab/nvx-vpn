<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NVX VPN</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* CSS полностью такой же, как в твоём примере */
:root { /* ... переменные ... */ }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;}
body{
    font-family:var(--font-body);
    background:linear-gradient(135deg,#000 0%,#0a0e27 50%,#000 100%);
    color:var(--text-primary);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
}
/* Весь твой CSS оставляем без изменений */
</style>
</head>
<body>
<div id="app">
<div class="ui-layer">

  <!-- HEADER -->
  <header class="header">
    <div class="user-info">
      <div class="avatar" id="avatarContainer">
        <img id="avatarImage">
        <span id="userInitial"><i class="fas fa-user" style="font-size:18px;color:rgba(255,255,255,0.6);"></i></span>
      </div>
      <div class="user-details">
        <span class="user-name" id="userName">Пользователь</span>
        <span class="user-id" id="userId">ID: —</span>
      </div>
    </div>
    <div class="balance" id="balanceDisplay">
      <i class="fas fa-coins"></i>
      <span id="userBalance">0.00₽</span>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content" id="content"></main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>Главная</span></button>
    <button class="nav-item" data-tab="tariffs"><i class="fas fa-tags"></i><span>Тарифы</span></button>
    <button class="nav-item" data-tab="referral"><i class="fas fa-users"></i><span>Рефералы</span></button>
    <button class="nav-item" data-tab="topup"><i class="fas fa-wallet"></i><span>Пополнить</span></button>
    <button class="nav-item" data-tab="support"><i class="fas fa-headset"></i><span>Поддержка</span></button>
  </nav>

</div>
</div>

<!-- TOAST -->
<div id="custom-toast" class="toast">
  <i class="fas fa-check-circle" id="toast-icon"></i>
  <span id="toast-message"></span>
</div>

<!-- MODAL -->
<div id="custom-modal" class="modal">
  <div class="modal-overlay"></div>
  <div class="modal-content glass">
    <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div id="modal-buttons" class="modal-buttons"></div>
  </div>
</div>

<script>
// ── STATE ──
const DEMO = {
    name: 'ONE_DAY',
    id: '641915862',
    balance: '0.00',
    avatar: null,
    hasSubscription: false,
    trialAvailable: true,
    referral: { total: 0, earned: 0, percent: 25 },
    refLink: 'https://t.me/NVXvpn_bot?start=ref641915862',
    tariffs: [
        { id:1, days:30,  stars:129, traffic_gb:60,  ip_limit:1,  label:'30 дней' },
        { id:2, days:90,  stars:369, traffic_gb:180, ip_limit:2,  label:'90 дней' },
        { id:3, days:180, stars:719, traffic_gb:360, ip_limit:3,  label:'180 дней' },
    ],
    locations: ['🇱🇻 LV','🇳🇱 NL','🇷🇺 RU','🇺🇸 US','🇵🇱 PL','🇰🇿 KZ','🇸🇪 SE','🇹🇷 TR','🇺🇦 UA'],
    nodesCount: 9,
};

const contentEl = document.getElementById('content');
const toast = document.getElementById('custom-toast');
const toastMsg = document.getElementById('toast-message');
const toastIcon = document.getElementById('toast-icon');
const modal = document.getElementById('custom-modal');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
const modalButtons = document.getElementById('modal-buttons');
const modalClose = document.getElementById('modal-close');
let currentTab = 'home';

// ── TOAST ──
function showToast(msg, type='success') {
    toastMsg.textContent = msg;
    if(type==='error'){toastIcon.className='fas fa-exclamation-circle';toast.style.borderColor='#ff6b6b';}
    else if(type==='warning'){toastIcon.className='fas fa-exclamation-triangle';toast.style.borderColor='#ffa502';}
    else{toastIcon.className='fas fa-check-circle';toast.style.borderColor='rgba(122,111,191,0.4)';}
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),3000);
}

// ── MODAL ──
function hideModal(){modal.classList.remove('show');}
modalClose?.addEventListener('click',hideModal);
modal?.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))hideModal();});

// ── HEADER ──
function updateHeader() {
    document.getElementById('userName').textContent = DEMO.name;
    document.getElementById('userId').textContent = 'ID: ' + DEMO.id;
    document.getElementById('userBalance').textContent = DEMO.balance + '₽';
}
updateHeader();
document.getElementById('balanceDisplay').addEventListener('click',()=>switchTab('topup'));

// ── NAV ──
function switchTab(tab) {
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
    currentTab = tab;
    showTab(tab);
}
document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});

// ── TABS ──
function showTab(tab) {
    contentEl.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    setTimeout(()=>{
        switch(tab){
            case 'home':     renderHome();     break;
            case 'tariffs':  renderTariffs();  break;
            case 'referral': renderReferral(); break;
            case 'topup':    renderTopUp();    break;
            case 'support':  renderSupport();  break;
        }
    }, 300);
}

// ── HOME ──
function renderHome() {
    contentEl.innerHTML = `
        <div class="section-title">Добро пожаловать, ${DEMO.name}</div>
        <div class="subscription-card glass" id="subCard"></div>
        <div id="trialBlock"></div>
    `;

    const subCard = document.getElementById('subCard');

    if (!DEMO.hasSubscription) {
        subCard.innerHTML = `
            <div style="text-align:center;padding:4px 0 8px;">
                <div style="width:56px;height:56px;border-radius:16px;background:rgba(122,111,191,0.1);border:1px solid rgba(122,111,191,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
                    <i class="fas fa-lock-open" style="font-size:24px;color:var(--accent-bright);"></i>
                </div>
                <div class="title" style="justify-content:center;margin-bottom:8px;">
                    <i class="fas fa-exclamation-circle"></i> Нет активной подписки
                </div>
                <p style="color:var(--text-secondary);font-size:13px;line-height:1.6;margin-bottom:16px;">
                    Активируйте подписку чтобы начать пользоваться VPN
                </p>
                <button class="btn primary" style="width:100%;" id="buySubBtn">
                    <i class="fas fa-shopping-bag"></i> Выбрать подписку
                </button>
            </div>
        `;
        document.getElementById('buySubBtn').addEventListener('click',()=>switchTab('tariffs'));

        if (DEMO.trialAvailable) {
            document.getElementById('trialBlock').innerHTML = `
                <div class="subscription-card glass" style="margin-top:0;">
                    <div class="title"><i class="fas fa-flask"></i> Тестовый период</div>
                    <div class="detail"><i class="fas fa-database"></i> Трафик <span class="value">48 ГБ</span></div>
                    <div class="detail"><i class="fas fa-hourglass-end"></i> Длительность <span class="value">1 день</span></div>
                    <div class="detail"><i class="fas fa-mobile-alt"></i> Устройств <span class="value">32</span></div>
                    <div class="detail"><i class="fas fa-globe"></i> Локации <span class="value">Все доступные</span></div>
                    <div class="detail"><i class="fas fa-info-circle"></i> Условие <span class="value">1 раз в 31 день</span></div>
                    <button class="btn primary" style="width:100%;margin-top:14px;border-radius:26px;" id="trialBtn">
                        <i class="fas fa-bolt"></i> Активировать бесплатно
                    </button>
                </div>
            `;
            document.getElementById('trialBtn').addEventListener('click',()=>{
                DEMO.trialAvailable = false;
                DEMO.hasSubscription = true;
                showToast('Тестовая подписка активирована');
                renderHome();
            });
        }
    } else {
        subCard.innerHTML = `<div class="title"><i class="fas fa-shield-alt"></i> У вас активная подписка</div>`;
    }
}

// ── TARIFFS ──
function renderTariffs() {
    contentEl.innerHTML = `<div class="section-title">Тарифы</div>`;
    const list = document.createElement('div');
    list.className = 'tariffs-list';
    DEMO.tariffs.forEach(t=>{
        const card = document.createElement('div');
        card.className = 'tariff-card glass';
        card.innerHTML = `
            <div class="tariff-card-header">
                <div class="tariff-card-days">
                    <div class="tariff-days-num">${t.days}</div>
                    <div class="tariff-days-label">дн.</div>
                </div>
                <div class="tariff-card-price">
                    <div class="tariff-price-num">${t.stars}</div>
                    <div class="tariff-price-cur">₽</div>
                </div>
            </div>
            <div class="tariff-card-btn" onclick="showToast('Выбрано: ${t.label}')">Выбрать</div>
        `;
        list.appendChild(card);
    });
    contentEl.appendChild(list);
}

// ── REFERRAL ──
function renderReferral() {
    contentEl.innerHTML = `
        <div class="section-title">Реферальная программа</div>
        <div class="ref-link">
            <p>Ваша ссылка: <span>${DEMO.refLink}</span></p>
            <button class="copy-btn" onclick="navigator.clipboard.writeText(DEMO.refLink); showToast('Ссылка скопирована')"><i class="fas fa-copy"></i></button>
        </div>
    `;
}

// ── TOPUP ──
function renderTopUp() {
    contentEl.innerHTML = `
        <div class="section-title">Пополнить баланс</div>
        <div class="topup-method" onclick="showToast('Метод: Банковская карта')">
            <i class="fas fa-credit-card"></i><span>Банковская карта</span><i class="fas fa-chevron-right"></i>
        </div>
        <div class="topup-method" onclick="showToast('Метод: QIWI/ЮMoney')">
            <i class="fas fa-wallet"></i><span>QIWI/ЮMoney</span><i class="fas fa-chevron-right"></i>
        </div>
    `;
}

// ── SUPPORT ──
function renderSupport() {
    contentEl.innerHTML = `
        <div class="section-title">Поддержка</div>
        <div class="support-card">
            <span class="support-icon"><i class="fas fa-headset"></i></span>
            <p>Свяжитесь с нами в Telegram для помощи и вопросов</p>
            <button class="btn primary" onclick="window.open('https://t.me/NVXvpn_bot', '_blank')">Написать в Telegram</button>
        </div>
    `;
}

// Инициализация
showTab(currentTab);
</script>
</body>
</html>
