/* 3D tilt — лёгкий наклон карточек по движению мыши/пальца */
function init3dTilt() {
    const hasReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (hasReducedMotion) return;
    const selector = '.tariff-card, .stat-card, .subscription-card, .support-card, .connect-help-card';
    const maxTilt = 6; // градусов
    const onMove = (card, x, y) => {
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (x - cx) / (rect.width / 2);   // -1..1
        const dy = (y - cy) / (rect.height / 2);  // -1..1
        const rY = Math.max(-1, Math.min(1, dx)) * maxTilt;
        const rX = -Math.max(-1, Math.min(1, dy)) * maxTilt;
        card.style.transform = `perspective(900px) rotateX(${rX}deg) rotateY(${rY}deg) translateY(-2px)`;
    };
    const reset = (card) => { card.style.transform = ''; };

    document.addEventListener('pointermove', (e) => {
        if (e.pointerType === 'touch') return; // touch обрабатываем отдельно
        const card = e.target.closest(selector);
        if (!card) return;
        onMove(card, e.clientX, e.clientY);
    });
    document.addEventListener('pointerleave', () => {
        document.querySelectorAll(selector).forEach(reset);
    }, true);
    document.addEventListener('mouseout', (e) => {
        const card = e.target.closest(selector);
        if (card && !card.contains(e.relatedTarget)) reset(card);
    });

    // Touch — короткий наклон при касании
    document.addEventListener('touchstart', (e) => {
        const card = e.target.closest(selector);
        if (!card) return;
        const t = e.touches[0];
        onMove(card, t.clientX, t.clientY);
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
        const card = e.target.closest(selector);
        if (card) setTimeout(() => reset(card), 200);
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
        const card = e.target.closest(selector);
        if (!card) return;
        const t = e.touches[0];
        onMove(card, t.clientX, t.clientY);
    }, { passive: true });
}

/* Pull-to-refresh на главной */
function initPullToRefresh() {
    const content = $('.content');
    if (!content) return;

    // Создаём индикатор
    const ind = document.createElement('div');
    ind.className = 'ptr-indicator';
    ind.innerHTML = '<i class="fas fa-arrow-down"></i>';
    const stageLayer = $('.ui-layer') || document.body;
    stageLayer.appendChild(ind);

    const THRESHOLD = 70;
    let startY = 0, curY = 0, pulling = false, active = false;

    content.addEventListener('touchstart', (e) => {
        if (currentTab !== 'home') return;
        if (content.scrollTop > 2) return;
        startY = e.touches[0].clientY;
        pulling = true;
        active = false;
    }, { passive: true });

    content.addEventListener('touchmove', (e) => {
        if (!pulling) return;
        curY = e.touches[0].clientY;
        const d = curY - startY;
        if (d <= 0) { ind.classList.remove('visible'); return; }
        const dampened = Math.min(d * 0.5, THRESHOLD + 20);
        ind.style.top = `${-60 + dampened}px`;
        ind.classList.add('visible');
        if (dampened >= THRESHOLD && !active) {
            active = true;
            HapticFeedback.buttonMedium();
            ind.style.transform = 'translateX(-50%) scale(1.1)';
        } else if (dampened < THRESHOLD && active) {
            active = false;
            ind.style.transform = 'translateX(-50%) scale(1)';
        }
    }, { passive: true });

    content.addEventListener('touchend', () => {
        if (!pulling) return;
        pulling = false;
        if (active) {
            ind.classList.add('loading');
            ind.innerHTML = '<i class="fas fa-circle-notch"></i>';
            ind.style.top = '20px';
            // Имитация рефреша
            setTimeout(() => {
                invalidateTabCache('home');
                showTab('home');
                HapticFeedback.success();
                ind.classList.remove('visible', 'loading');
                ind.style.top = '-60px';
                ind.style.transform = 'translateX(-50%) scale(1)';
                ind.innerHTML = '<i class="fas fa-arrow-down"></i>';
            }, 900);
        } else {
            ind.classList.remove('visible');
            ind.style.top = '-60px';
            ind.style.transform = 'translateX(-50%) scale(1)';
        }
    }, { passive: true });
}

function showLoading(message = 'Загрузка...') {
    let overlay = document.getElementById('loading-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'loading-overlay';
        overlay.innerHTML = `<div class="lo-spinner"></div><span class="lo-msg">${escapeHtml(message)}</span>`;
        document.body.appendChild(overlay);
    } else {
        const msgEl = overlay.querySelector('.lo-msg');
        if (msgEl) msgEl.textContent = message;
        // FIX v3 #13: Don't clone spinner if already visible (prevents blink)
        if (!overlay.classList.contains('visible')) {
            const old = overlay.querySelector('.lo-spinner');
            if (old) old.replaceWith(old.cloneNode(true));
        }
    }
    overlay.style.display = 'flex';
    /* FIX v5.5 #10: Explicit reflow instead of double rAF hack */
    void overlay.offsetHeight;
    overlay.classList.add('visible');
}

function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) {
        overlay.classList.remove('visible');
        setTimeout(() => { overlay.style.display = 'none'; }, 250);
    }
}

function _hideSplash() {
    const splash = document.getElementById('nvx-splash');
    if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => { splash.style.display = 'none'; }, 500);
    }
}

/* ═══════════════════════════════════════
   SPLASH LOGO ERROR HANDLER (replaces inline onerror)
═══════════════════════════════════════ */
(function _initSplashErrorHandler() {
    const logo = document.getElementById('nvx-splash-logo');
    const fallback = document.getElementById('nvx-splash-fallback');
    if (logo && fallback) {
        logo.addEventListener('error', function() {
            logo.style.display = 'none';
            fallback.style.display = 'flex';
        });
    }
})();

// FIX v3-14: Splash waits for BOTH initApp completion AND splash animation (1.55s)
const _splashMinTime = new Promise(r => setTimeout(r, 1550));
let _initOk = true;
try {
    initApp();
} catch (err) {
    _initOk = false;
    console.error('[NVX] Критическая ошибка инициализации:', err);
    contentEl.innerHTML = `
        <div class="error-message error-message-lg">
            <i class="fas fa-exclamation-triangle"></i>
            <div class="error-message-title">Ошибка загрузки</div>
            <div>Не удалось инициализировать приложение. Попробуйте перезагрузить.</div>
            <button type="button" class="btn primary error-message-action" id="errorReloadBtn">
                <i class="fas fa-redo"></i> Перезагрузить
            </button>
        </div>`;
    const _reloadBtn = document.getElementById('errorReloadBtn');
    if (_reloadBtn) _reloadBtn.addEventListener('click', () => location.reload());
}
// Hide splash after animation finishes (regardless of init success/failure)
_splashMinTime.then(() => _hideSplash());
</script>
</body>
</html>
