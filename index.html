<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1635">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NVX VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    /* Colors */
    --bg-dark: #0a0e27;
    --bg-primary: #1a1635;
    --bg-card: rgba(20, 25, 45, 0.25);
    --bg-card-hover: rgba(30, 40, 65, 0.35);
    --accent: #7a6fbf;
    --accent-bright: #9a8fdf;
    --accent-dim: rgba(122, 111, 191, 0.12);
    --accent-hover: rgba(122, 111, 191, 0.35);
    --text-primary: #e5e5f0;
    --text-secondary: #9a9fb5;
    --text-tertiary: #6a7080;
    --error: #ff6b6b;
    --warning: #ffa502;
    
    /* Typography */
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    
    /* Spacing */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    
    /* Animation */
    --transition-fast: 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    --transition-normal: 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    --transition-slow: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    --anim-duration: 0.6s;
    --anim-easing: ease-out;
    
    /* Shadows */
    --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.2);
    --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.25);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.3);
    --shadow-accent: 0 0 20px rgba(122, 111, 191, 0.5);
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
}

/* ═══════════════════════════════════════
   3D SPACE BACKGROUND
═══════════════════════════════════════ */
#space-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(ellipse at 50% 50%, #1a1635 0%, #0a0a1a 50%, #000 100%);
    overflow: hidden;
}

#space-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(122, 111, 191, 0.15) 0%, transparent 60%);
    filter: blur(60px);
    animation: pulseGlow 8s ease-in-out infinite;
}

@keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
}

.space-orb {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%,
        rgba(122, 111, 191, 0.6) 0%,
        rgba(154, 143, 223, 0.4) 30%,
        rgba(76, 66, 141, 0.25) 50%,
        rgba(30, 25, 65, 0.1) 70%,
        transparent 100%);
    filter: blur(50px);
    animation: orbFloat 20s ease-in-out infinite;
    box-shadow: 0 0 100px rgba(122, 111, 191, 0.3), inset 0 0 60px rgba(154, 143, 223, 0.2);
}

.space-orb-1 { width: 600px; height: 600px; top: -200px; left: -200px; animation-delay: 0s; animation-duration: 25s; }
.space-orb-2 { width: 500px; height: 500px; top: 50%; right: -150px; animation-delay: -8s; animation-duration: 30s; }
.space-orb-3 { width: 450px; height: 450px; bottom: -100px; left: 30%; animation-delay: -15s; animation-duration: 28s; }
.space-orb-4 { width: 350px; height: 350px; top: 30%; left: 40%; animation-delay: -5s; animation-duration: 35s; }

@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    25% { transform: translate(50px, -80px) rotate(90deg) scale(1.1); }
    50% { transform: translate(-30px, 60px) rotate(180deg) scale(0.95); }
    75% { transform: translate(80px, 40px) rotate(270deg) scale(1.05); }
}

.space-stars {
    position: absolute;
    inset: 0;
    background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.3), transparent),
        radial-gradient(2px 2px at 60% 70%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 50% 20%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(1px 1px at 80% 10%, rgba(255, 255, 255, 0.15), transparent),
        radial-gradient(2px 2px at 90% 60%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 33% 50%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(2px 2px at 15% 80%, rgba(255, 255, 255, 0.2), transparent);
    background-size: 200% 200%;
    animation: starsTwinkle 8s ease-in-out infinite;
    opacity: 0.5;
}

@keyframes starsTwinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.02); }
}

#app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
}

.ui-layer {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    padding-left: max(12px, var(--safe-left));
    padding-right: max(12px, var(--safe-right));
    overflow: hidden;
}

/* ═══════════════════════════════════════
   ENTRANCE ANIMATIONS
═══════════════════════════════════════ */
@keyframes nvxFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes nvxSlideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes nvxSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes nvxSlideLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

.anim-base { opacity: 0; }
.anim-title { animation: nvxSlideDown var(--anim-duration) var(--anim-easing) both; }
.anim-left { animation: nvxSlideLeft var(--anim-duration) var(--anim-easing) both; }
.anim-up { animation: nvxSlideUp var(--anim-duration) var(--anim-easing) both; }
.anim-down { animation: nvxSlideDown var(--anim-duration) var(--anim-easing) both; }
.anim-fade { animation: nvxFadeIn var(--anim-duration) var(--anim-easing) both; }

/* Animation delays */
.anim-d0 { animation-delay: 0.00s; }
.anim-d1, .anim-left-d1, .anim-up-d1, .anim-down-d1, .anim-fade-d1 { animation-delay: 0.05s; }
.anim-d2, .anim-left-d2, .anim-up-d2, .anim-down-d2, .anim-fade-d2 { animation-delay: 0.1s; }
.anim-d3, .anim-left-d3, .anim-up-d3, .anim-down-d3, .anim-fade-d3 { animation-delay: 0.15s; }
.anim-up-d4, .anim-fade-d4 { animation-delay: 0.2s; }
.anim-up-d5, .anim-fade-d5 { animation-delay: 0.25s; }
.anim-up-d6, .anim-fade-d6 { animation-delay: 0.3s; }

.anim-done {
    animation: none !important;
    opacity: 1 !important;
    transform: none !important;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    margin-top: max(10px, var(--safe-top));
    margin-bottom: 8px;
    flex-shrink: 0;
    background: rgba(20, 25, 45, 0.25);
    border: 1px solid rgba(70, 80, 110, 0.15);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    transition: var(--transition-normal);
    cursor: default;
}

.header:hover {
    transform: translateY(-2px);
    border-color: rgba(122, 111, 191, 0.35);
    background: rgba(25, 32, 58, 0.35);
    box-shadow: var(--shadow-md);
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.6), rgba(154, 143, 223, 0.4));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
    border: 1px solid rgba(122, 111, 191, 0.3);
    overflow: hidden;
}

.avatar img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: none;
}

.user-details {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
}

.user-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.user-id {
    font-size: 11px;
    color: var(--text-secondary);
}

.balance {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(30, 35, 55, 0.3);
    border-radius: 28px;
    font-weight: 600;
    font-size: 13px;
    border: 1px solid rgba(70, 80, 110, 0.2);
    color: var(--text-primary);
    flex-shrink: 0;
    cursor: pointer;
    transition: var(--transition-fast);
}

.balance:hover {
    background: rgba(40, 50, 75, 0.4);
}

.balance i {
    font-size: 14px;
    color: var(--accent-bright);
}

/* ═══════════════════════════════════════
   CONTENT
═══════════════════════════════════════ */
.content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 2px 0 8px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    -webkit-overflow-scrolling: touch;
}

.content::-webkit-scrollbar { display: none; }

.section-title {
    font-family: var(--font-display);
    font-size: 21px;
    font-weight: 700;
    margin: 6px 0 12px;
    padding-bottom: 6px;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    position: relative;
    display: block;
}

.section-title::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-bright), transparent);
    border-radius: 2px;
}

.section-subtitle {
    font-size: 12px;
    font-weight: 600;
    margin: 14px 0 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* ═══════════════════════════════════════
   GLASS CARD COMPONENT
═══════════════════════════════════════ */
.glass {
    background: rgba(18, 22, 48, 0.35);
    backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(100, 115, 155, 0.2);
    border-radius: 20px;
    transition: var(--transition-normal);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

.glass:hover {
    border-color: rgba(122, 111, 191, 0.4);
    background: rgba(22, 28, 58, 0.45);
    box-shadow: var(--shadow-lg);
}

/* ═══════════════════════════════════════
   SUBSCRIPTION CARD
═══════════════════════════════════════ */
.subscription-card {
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    background: rgba(15, 18, 40, 0.55);
    border: 1px solid rgba(80, 90, 130, 0.25);
    border-radius: 20px;
    backdrop-filter: blur(14px);
    transition: transform var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal);
    cursor: default;
}

.subscription-card:hover {
    transform: translateY(-2px);
    border-color: rgba(122, 111, 191, 0.4);
    box-shadow: var(--shadow-md);
}

.subscription-card .title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--accent-bright);
    display: flex;
    align-items: center;
    gap: 8px;
}

.subscription-card .title i { font-size: 18px; }

.subscription-card .detail {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    margin-bottom: 6px;
    color: var(--text-secondary);
    padding: 4px 0;
    border-bottom: 1px solid rgba(70, 80, 110, 0.1);
    transition: var(--transition-fast);
}

.subscription-card .detail:last-of-type { border-bottom: none; }
.subscription-card .detail i { width: 16px; color: var(--accent-bright); font-size: 12px; flex-shrink: 0; }
.subscription-card .detail .value { color: var(--text-primary); font-weight: 600; margin-left: auto; }

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
    border: none;
    border-radius: 18px;
    padding: 10px 18px;
    font-weight: 600;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: var(--transition-normal);
    font-family: var(--font-body);
    white-space: nowrap;
    min-height: 44px;
    -webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(0.97); }

.btn.primary {
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.7), rgba(154, 143, 223, 0.5));
    color: white;
    border: 1px solid rgba(122, 111, 191, 0.3);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 12px rgba(122, 111, 191, 0.15);
}

.btn.primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(122, 111, 191, 0.2);
}

.btn.secondary {
    background: rgba(30, 35, 55, 0.3);
    border: 1px solid rgba(70, 80, 110, 0.2);
    color: var(--text-secondary);
    backdrop-filter: blur(8px);
}

.btn.secondary:hover {
    background: rgba(40, 50, 75, 0.4);
    color: var(--accent-bright);
}

.progress-bar {
    height: 4px;
    background: rgba(70, 80, 110, 0.15);
    border-radius: 2px;
    margin: 8px 0 6px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, rgba(122, 111, 191, 0.6), rgba(154, 143, 223, 0.4));
    border-radius: 2px;
    transition: width 0.4s ease;
}

.action-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
}

.btn.action-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 16px;
    text-align: left;
    justify-content: flex-start;
    width: 100%;
    background: rgba(20, 25, 45, 0.3) !important;
    border: 1px solid rgba(70, 80, 110, 0.2);
    box-shadow: none !important;
    color: var(--text-primary);
    transition: transform var(--transition-normal), border-color var(--transition-normal), background var(--transition-normal);
}

.btn.action-row:hover {
    background: rgba(122, 111, 191, 0.1) !important;
    border-color: rgba(122, 111, 191, 0.25) !important;
    transform: translateY(-2px) !important;
    box-shadow: var(--shadow-sm) !important;
}

.action-icon-wrap {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: rgba(70, 80, 110, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    color: var(--accent-bright);
    transition: var(--transition-fast);
}

.btn.action-row:hover .action-icon-wrap {
    background: rgba(122, 111, 191, 0.15);
    transform: scale(1.08);
}

.action-text-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
}

.action-label {
    font-weight: 700;
    font-size: 14px;
    color: var(--text-primary);
}

.action-desc {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
}

.action-arrow {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.35);
    flex-shrink: 0;
}

/* ═══════════════════════════════════════
   TARIFF CARDS
═══════════════════════════════════════ */
.tariffs-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.tariff-card {
    padding: 13px 14px;
    cursor: pointer;
    transition: transform var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal), background var(--transition-normal);
    position: relative;
    overflow: hidden;
    background: rgba(20, 25, 45, 0.25);
    border: 1px solid rgba(70, 80, 110, 0.18);
    border-radius: 18px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 9px;
}

.tariff-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.tariff-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.tariff-card-days {
    display: flex;
    align-items: baseline;
    gap: 4px;
}

.tariff-days-num {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1;
}

.tariff-days-label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
}

.tariff-card-price {
    display: flex;
    align-items: baseline;
    gap: 2px;
    background: var(--accent-dim);
    border: 1px solid rgba(122, 111, 191, 0.2);
    border-radius: 10px;
    padding: 4px 12px;
    flex-shrink: 0;
}

.tariff-price-num {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 800;
    color: var(--accent-bright);
    line-height: 1;
}

.tariff-price-cur {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
}

.tariff-card-features {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.tariff-feature {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-secondary);
    background: rgba(30, 35, 55, 0.4);
    border: 1px solid rgba(70, 80, 110, 0.15);
    border-radius: 7px;
    padding: 3px 8px;
    font-weight: 500;
}

.tariff-feature i {
    color: var(--accent-bright);
    font-size: 10px;
    width: 12px;
    text-align: center;
}

.tariff-locations {
    border-top: 1px solid rgba(70, 80, 110, 0.12);
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.tariff-locations-label {
    font-size: 10px;
    color: var(--text-tertiary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.tariff-locations-label i {
    color: var(--accent);
    font-size: 10px;
}

.tariff-countries {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}

.country-flag {
    font-size: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(30, 35, 55, 0.4);
    border: 1px solid rgba(70, 80, 110, 0.15);
    transition: all 0.22s;
    cursor: default;
    line-height: 1;
}

.country-flag:hover {
    background: rgba(122, 111, 191, 0.15);
    border-color: rgba(122, 111, 191, 0.3);
    transform: scale(1.12);
}

.tariff-locations-note {
    font-size: 10px;
    color: var(--accent-bright);
    background: rgba(122, 111, 191, 0.08);
    border: 1px solid rgba(122, 111, 191, 0.15);
    border-radius: 7px;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 500;
}

.tariff-card-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px;
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.5), rgba(154, 143, 223, 0.3));
    border: 1px solid rgba(122, 111, 191, 0.3);
    border-radius: 11px;
    font-size: 13px;
    font-weight: 700;
    color: white;
    transition: all 0.2s;
}

.tariff-card:hover .tariff-card-btn {
    background: linear-gradient(135deg, rgba(122, 111, 191, 0.7), rgba(154, 143, 223, 0.5));
}

/* ═══════════════════════════════════════
   STATS GRID
═══════════════════════════════════════ */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}

.stat-card {
    padding: 12px 8px;
    text-align: center;
    border-radius: 16px;
    background: rgba(20, 25, 45, 0.2);
    border: 1px solid rgba(70, 80, 110, 0.15);
    backdrop-filter: blur(8px);

    // ═══════════════════════════════════════
    // UTILITY FUNCTIONS
    // ═══════════════════════════════════════
    function showToast(message, type = 'success') {
        const { toast, toastMsg, toastIcon } = elements;
        
        if (state.toastTimer) {
            clearTimeout(state.toastTimer);
            state.toastTimer = null;
        }

        toastMsg.textContent = message;
        
        const styles = {
            success: { icon: 'fa-check-circle', color: 'var(--accent-bright)', border: 'rgba(122, 111, 191, 0.4)' },
            error: { icon: 'fa-exclamation-circle', color: '#ff6b6b', border: 'rgba(255, 107, 107, 0.5)' },
            warning: { icon: 'fa-exclamation-triangle', color: '#ffa502', border: 'rgba(255, 165, 2, 0.5)' },
        };

        const style = styles[type] || styles.success;
        toastIcon.className = `fas ${style.icon}`;
        toast.style.borderColor = style.border;
        toast.style.color = style.color;

        toast.classList.add('show');
        state.toastTimer = setTimeout(() => {
            toast.classList.remove('show');
            state.toastTimer = null;
        }, 3000);
    }

    // ═══════════════════════════════════════
    // MODAL FUNCTIONS
    // ═══════════════════════════════════════
    function hideModal() {
        elements.modal.classList.remove('show');
    }

    function showModal(title, bodyHTML, buttons) {
        const { modal, modalTitle, modalBody, modalButtons } = elements;
        modalTitle.textContent = title;
        modalBody.innerHTML = bodyHTML;
        modalButtons.innerHTML = '';
        
        if (Array.isArray(buttons)) {
            buttons.forEach(btn => modalButtons.appendChild(btn));
        } else if (buttons) {
            modalButtons.appendChild(buttons);
        }
        
        modal.classList.add('show');
    }

    // ═══════════════════════════════════════
    // ANIMATION CLEANUP
    // ═══════════════════════════════════════
    function registerAnimCleanup() {
        if (state.cleanupTimer) {
            clearTimeout(state.cleanupTimer);
        }
        
        state.cleanupTimer = setTimeout(() => {
            document.querySelectorAll('.anim-title, .anim-left, .anim-up, .anim-down, .anim-fade').forEach(el => {
                el.classList.add('anim-done');
            });
            state.cleanupTimer = null;
        }, 950);
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        state.currentTab = tab;
        showTab(tab);

    // ═══════════════════════════════════════
    function showTab(tab) {
        const { content } = elements;
        
        if (state.tabTimer) {
            clearTimeout(state.tabTimer);
            state.tabTimer = null;
        }

        content.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';

        state.tabTimer = setTimeout(() => {
            state.tabTimer = null;
            
            const renderers = {
                home: renderHome,
                tariffs: renderTariffs,
                referral: renderReferral,
                topup: renderTopUp,
                support: renderSupport,
            };

            const renderer = renderers[tab];
            if (renderer) renderer();
        }, 250);
    }

                const bal = parseFloat(DEMO.balance);

                        <div class="modal-detail-row">

                            <span class="modal-detail-value">${tariff.ip_limit * n} <span style="font-size:10px;color:var(--text-tertiary);">(${tariff.ip_limit} на лок.)</span></span>

                            <span class="modal-detail-label">Стоимость</span>
                            <span class="modal-detail-value accent">${tariff.stars}₽</span>
                        </div>

                        <i class="fas fa-wallet"></i>
                        <span>На балансе <span class="warn-balance">${bal.toFixed(2)}₽</span> — не хватает <span class="warn-short">${diff}₽</span></span>
                    </div>` : ''}
                `;

                const btn = document.createElement('button');
                btn.className = 'modal-btn modal-btn-primary';
                btn.innerHTML = `<i class="fas fa-credit-card"></i> Оплатить ${tariff.stars}₽`;

                    hideModal();

                        switchTab('topup');
                    } else {
                        showToast('Доступно после подключения backend', 'warning');
                    }
                });

                showModal('Подтверждение покупки', bodyHTML, btn);
            });
        });

        registerAnimCleanup();
    }

            { icon: 'fa-exclamation-triangle', question: 'VPN не подключается или работает нестабильно', answer: 'Убедитесь, что подписка активна. Переподключитесь или обновите конфигурацию. Попробуйте сменить сервер. Если проблема сохраняется — обратитесь в поддержку.' },
            { icon: 'fa-wallet', question: 'Какие способы пополнения баланса доступны?', answer: 'Поддерживаются: <strong>Telegram Stars</strong>, <strong>CryptoBot</strong> (USDT, TON), <strong>Lolz Market</strong>, <strong>СБП</strong>.' },
            { icon: 'fa-flask', question: 'Как получить тестовый период?', answer: 'Тестовая подписка — <strong>один раз в 31 день</strong>: 1 день, 1.5 ГБ на локацию, 1 устройство на локацию. Баннер появится на главной вкладке.' },
            { icon: 'fa-globe', question: 'Сколько серверов и в каких странах?', answer: 'Сеть охватывает <strong>9+ стран</strong>: LV, NL, RU, US, PL, KZ, SE, TR, UA. Список постоянно расширяется.' },
        ];

        content.innerHTML = `
            <div class="section-title anim-title">Служба поддержки</div>
            <div class="support-card glass anim-fade anim-d1">
                <i class="fas fa-headset support-icon"></i>
                <p>Есть вопросы? Свяжитесь с нами 24/7</p>
                <button class="btn primary" id="supportChatBtn">
                    <i class="fab fa-telegram"></i> Открыть чат
                </button>
            </div>
            <div class="faq glass anim-fade anim-d2">
                <div class="faq-header"><i class="fas fa-layer-group"></i> Часто задаваемые вопросы</div>
                <div class="faq-list">
                    ${faqItems.map((item, i) => `
                    <details class="faq-item anim-fade anim-d${Math.min(i + 3, 6)}">
                        <summary>
                            <div class="faq-icon-wrap"><i class="fas ${item.icon}"></i></div>
                            <span class="faq-question">${item.question}</span>
                            <i class="fas fa-chevron-down faq-chevron"></i>
                        </summary>
                        <div class="faq-answer"><p>${item.answer}</p></div>
                    </details>`).join('')}

            </div>
        `;

        document.getElementById('supportChatBtn')?.addEventListener('click', () => {
            showToast('Открываем чат поддержки');
        });

        registerAnimCleanup();
    }

    // ═══════════════════════════════════════
    // MODAL EVENT LISTENERS
    // ═══════════════════════════════════════
    function setupModalListeners() {
        const { modal, modalClose } = elements;

        modalClose?.addEventListener('click', hideModal);

        modal?.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                hideModal();
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('show')) {
                hideModal();
            }
        });
    }

    // ═══════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════
    function init() {
        setupHeader();
        setupNavigation();
        setupModalListeners();
        setupActionButtons();
        showTab('home');
    }

    // Start the app
    init();
})();
</script>
